---
# JTS CamillaDSP config.
#
# Bridges snd-aloop card "Loopback" to the Apple USB-C dongle (the
# speaker output). Renderers write private fan-in lanes; jasper-fanin
# sums those lanes and writes the combined music stream to substream 7,
# which CamillaDSP captures through `plug:jasper_capture`.
#
# Capture goes through `pcm.jasper_capture` (a dsnoop wrapper defined
# in /etc/asound.conf), wrapped in `plug:` so Camilla and the AEC bridge
# can both tap the same summed music stream. Direct hw access would deny
# dsnoop the slave and make the bridge fail to open.
#
# Ducking on wake is via main_volume (set_main_volume websocket call,
# see jasper/camilla.py Ducker), NOT the master_gain mixer below —
# that mixer is identity (gain: 0) and exists as a future-EQ hook.

devices:
  samplerate: 48000
  chunksize: 1024
  queuelimit: 4
  # `plug:jasper_capture` is a dsnoop wrapper so the optional AEC bridge
  # can tap the same music stream as CamillaDSP. On the Pi, the default
  # target_level=chunksize left the playback buffer too shallow and
  # produced periodic `PB: Prepare playback after buffer underrun` warnings
  # with otherwise clean shairport logs. The 2026-05-14 fix bumped this to
  # 4096 (~85 ms) — comfortably underrun-safe but generous on latency.
  # 2026-05-25 trim: reduced to 2048 (~43 ms) as an independent latency
  # optimization. 2048 == 2× chunksize, the documented floor for stable
  # operation (target_level >= chunksize is hard-required; ≥2× is the
  # convention for jitter absorption). Still well above the dsnoop/dmix
  # scheduling-jitter floor we measured at chunksize back in 2026-05-14.
  # Saves ~21 ms of music latency in the fan-in topology. Operator
  # gate: 24-hour zero-xrun soak under realistic load (Spotify + BT
  # phone + TTS) before considering this stable; revert to 4096 if
  # `event=camilla.playback_underrun` lines
  # appear at any rate above zero.
  target_level: 2048
  # Capture rate (48 kHz, from snd-aloop) equals playback rate
  # (48 kHz, to dongle dmix), so no resampler is needed. With both
  # ends at the same rate, the canonical CamillaDSP config is
  # enable_rate_adjust=true and NO resampler block — snd-aloop
  # supports kernel-side rate adjust, so CamillaDSP nudges the
  # capture rate to keep the buffer level steady against the
  # dongle's actual clock. The previous config had AsyncSinc Balanced
  # doing 1:1 resampling on top of rate_adjust, which CamillaDSP
  # itself flagged as "Needless 1:1 sample rate conversion active"
  # and which produced the alternating +50ms/-485ms sync errors
  # documented in HEnquist/camilladsp#207 and shairport-sync#1980.
  enable_rate_adjust: true
  capture:
    type: Alsa
    channels: 2
    device: "plug:jasper_capture"
    format: S32_LE
  playback:
    # jasper_out is the dmix defined in /etc/asound.conf that fans the
    # CamillaDSP-processed music AND jasper-voice TTS into one stream
    # before the dongle. install.sh writes /etc/asound.conf with the
    # detected dongle card name substituted in. CamillaDSP just
    # opens the named PCM here — no card detection needed in this
    # config.
    type: Alsa
    channels: 2
    device: "jasper_out"
    format: S16_LE

filters:
  flat:
    type: Gain
    parameters: { gain: 0.0, inverted: false, mute: false }

mixers:
  master_gain:
    channels: { in: 2, out: 2 }
    mapping:
      - dest: 0
        sources: [{ channel: 0, gain: 0, inverted: false }]
      - dest: 1
        sources: [{ channel: 1, gain: 0, inverted: false }]

pipeline:
  - type: Mixer
    name: master_gain
  - type: Filter
    channels: [0]
    names: [flat]
  - type: Filter
    channels: [1]
    names: [flat]
