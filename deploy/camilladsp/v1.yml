---
# CamillaDSP 4.x v1 passthrough config.
# Capture: ALSA Loopback (moOde renderers write here via the
# pcm._audioout hijack). Playback: pcm.jasper_out — the fan-out
# PCM defined in /root/.asoundrc that duplicates the processed
# stream to BOTH the Apple USB-C dongle (the actual speaker) AND
# the XVF3800's USB-IN endpoint (the AEC reference). See the
# header comment in deploy/alsa/asoundrc.jasper for the full
# rationale on why we fan out instead of using the chip's DAC.
#
# Single master_gain mixer per channel so the daemon can SetVolume
# for ducking without reloading the YAML (Reload glitches audio).
#
# All rates pinned at 48 kHz — Apple dongle is 48 kHz only on
# Linux, and Loopback locks rate at first opener. The XVF leg
# downsamples 48→16 kHz inside the plug wrapper at the asoundrc
# level; CamillaDSP doesn't see that.

devices:
  samplerate: 48000
  chunksize: 1024
  queuelimit: 4
  enable_rate_adjust: true
  capture:
    # plughw lets ALSA convert if MPD writes a narrower format (e.g. S16LE).
    # Loopback locks RATE at the writer's rate though — moOde must be
    # configured to output 48 kHz to Loopback (BRINGUP.md Phase 1B).
    type: Alsa
    channels: 2
    device: "plughw:CARD=Loopback,DEV=1,SUBDEV=0"
    format: S32_LE
  playback:
    # pcm.jasper_out fans the stream out to the dongle + XVF USB-IN.
    # See /root/.asoundrc for the route → multi → per-device dmix
    # topology. Format S16_LE because the XVF leg's USB-IN endpoint
    # only accepts S16_LE 16 kHz; the route+multi pipeline carries
    # S16_LE through to both legs.
    type: Alsa
    channels: 2
    device: "jasper_out"
    format: S16_LE

filters:
  flat:
    type: Gain
    parameters:
      gain: 0.0
      inverted: false
      mute: false

mixers:
  master_gain:
    channels:
      in: 2
      out: 2
    mapping:
      - dest: 0
        sources:
          - channel: 0
            gain: 0
            inverted: false
      - dest: 1
        sources:
          - channel: 1
            gain: 0
            inverted: false

pipeline:
  - type: Mixer
    name: master_gain
  - type: Filter
    channels: [0]
    names: [flat]
  - type: Filter
    channels: [1]
    names: [flat]
