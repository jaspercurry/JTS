---
# JTS CamillaDSP config.
#
# Bridges snd-aloop card "Loopback" (where librespot, shairport-sync,
# and bluealsa-aplay all write their audio) to the Apple USB-C dongle
# (the speaker output). plughw on the capture side absorbs renderer
# rate/format mismatches (Spotify FLOAT_LE/44.1, AirPlay/BT S16/44.1
# all converge here); CamillaDSP resamples internally to 48 kHz which
# is the dongle's native rate.
#
# Capture goes through `pcm.jasper_capture` (a dsnoop wrapper defined
# in /root/.asoundrc), wrapped in `plug:` so renderer rate/format
# mismatches still get absorbed. Why dsnoop unconditionally rather
# than direct hw: dsnoop has to be the only opener of the underlying
# Loopback,1,0 substream, so if the AEC bridge gets enabled later it
# can also tap the same stream — direct hw access here would deny
# dsnoop the slave and the bridge would fail to open. With camilla
# as the only client, dsnoop is functionally equivalent to a direct
# hw open at zero cost.
#
# master_gain mixer is the ducking knob jasper-voice uses on wake.

devices:
  samplerate: 48000
  chunksize: 1024
  queuelimit: 4
  enable_rate_adjust: true
  resampler:
    type: AsyncSinc
    profile: Balanced
  capture:
    type: Alsa
    channels: 2
    device: "plug:jasper_capture"
    format: S32_LE
  playback:
    # jasper_out is the dmix defined in /root/.asoundrc that fans the
    # CamillaDSP-processed music AND jasper-voice TTS into one stream
    # before the dongle. install.sh writes /root/.asoundrc with the
    # detected dongle card name substituted in. CamillaDSP just
    # opens the named PCM here — no card detection needed in this
    # config.
    type: Alsa
    channels: 2
    device: "jasper_out"
    format: S16_LE

filters:
  flat:
    type: Gain
    parameters: { gain: 0.0, inverted: false, mute: false }

mixers:
  master_gain:
    channels: { in: 2, out: 2 }
    mapping:
      - dest: 0
        sources: [{ channel: 0, gain: 0, inverted: false }]
      - dest: 1
        sources: [{ channel: 1, gain: 0, inverted: false }]

pipeline:
  - type: Mixer
    name: master_gain
  - type: Filter
    channels: [0]
    names: [flat]
  - type: Filter
    channels: [1]
    names: [flat]
