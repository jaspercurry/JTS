---
# CamillaDSP 4.x v1 passthrough config.
# Capture: ALSA Loopback (moOde writes here). Playback: Apple USB-C dongle.
# Single master_gain mixer per channel so the daemon can SetVolume for ducking
# without reloading the YAML (Reload glitches audio).
#
# All rates pinned at 48 kHz — Apple dongle is 48 kHz only on Linux, and
# Loopback locks rate at first opener.

devices:
  samplerate: 48000
  chunksize: 1024
  queuelimit: 4
  enable_rate_adjust: true
  capture:
    # plughw lets ALSA convert if MPD writes a narrower format (e.g. S16LE).
    # Loopback locks RATE at the writer's rate though — moOde must be
    # configured to output 48 kHz to Loopback (BRINGUP.md Phase 1B).
    type: Alsa
    channels: 2
    device: "plughw:CARD=Loopback,DEV=1,SUBDEV=0"
    format: S32_LE
  playback:
    # __PLAYBACK_DEVICE__ is substituted by deploy/install.sh based on
    # JASPER_AEC_MODE in /etc/jasper/jasper.env:
    #   hardware → "jasper_xvf"     (XVF3800 jack as speaker; chip's
    #                                 hardware AEC active)
    #   software → "jasper_dongle"  (Apple dongle / any DAC; daemon
    #                                 uses Silero VAD gating — TODO)
    # Both PCMs are defined in /root/.asoundrc and coexist; switching
    # modes is JASPER_AEC_MODE flip + re-run install.sh + restart.
    type: Alsa
    channels: 2
    device: "__PLAYBACK_DEVICE__"
    format: S16_LE

filters:
  flat:
    type: Gain
    parameters:
      gain: 0.0
      inverted: false
      mute: false

mixers:
  master_gain:
    channels:
      in: 2
      out: 2
    mapping:
      - dest: 0
        sources:
          - channel: 0
            gain: 0
            inverted: false
      - dest: 1
        sources:
          - channel: 1
            gain: 0
            inverted: false

pipeline:
  - type: Mixer
    name: master_gain
  - type: Filter
    channels: [0]
    names: [flat]
  - type: Filter
    channels: [1]
    names: [flat]
