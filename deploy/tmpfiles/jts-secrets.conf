# WS1 Phase 4a — the group-`jasper-secrets` secret compartment.
#
# These dirs deliberately live OUTSIDE the /var/lib/jasper StateDirectory:
# systemd's StateDirectory=jasper recursively chowns its contents to group
# `jasper` on every jasper-voice/-mux start, which would re-expose these
# secrets to every jasper daemon. Keeping them in a sibling tree + declaring
# them here lets systemd-tmpfiles recreate the structure (correct owner /
# group / setgid mode) at every boot, so a wiped /var self-heals — the
# household re-links its accounts via the wizards; the dirs are already there.
#
# Mode 2770: owner root + group jasper-secrets rwx, NO access for other
# daemons (mux/control/input). setgid (the leading 2) makes new token files
# written here inherit group jasper-secrets automatically. Only jasper-voice
# and jasper-web are in the jasper-secrets group.
#
# install.sh also creates these directly (install -d) so a deploy takes
# effect without waiting for a reboot. See
# docs/HANDOFF-privilege-separation.md "Phase 4".
d /var/lib/jasper-secrets 2770 root jasper-secrets -
d /var/lib/jasper-secrets/google 2770 root jasper-secrets -
d /var/lib/jasper-secrets/google/tokens 2770 root jasper-secrets -
