# WS1 Phase 4b — the group-`jasper-intsecrets` integration-secret compartment.
#
# These dirs deliberately live OUTSIDE the /var/lib/jasper StateDirectory:
# systemd's StateDirectory=jasper recursively chowns its contents to group
# `jasper` on every jasper-voice/-mux start, which would re-expose these
# secrets to every jasper daemon. Keeping them in a sibling tree + declaring
# them here lets systemd-tmpfiles recreate the structure (correct owner /
# group / setgid mode) at every boot, so a wiped /var self-heals — the
# household re-links integrations via the wizards; the dirs are already there.
#
# Mode 2770: owner root + group jasper-intsecrets rwx, NO access for
# jasper-input. setgid (the leading 2) makes new Spotify token files written
# here inherit group jasper-intsecrets automatically. jasper-voice,
# jasper-control, jasper-mux, and jasper-web are in the group.
#
# install.sh also creates these directly (install -d) so a deploy takes
# effect without waiting for a reboot. See
# docs/HANDOFF-privilege-separation.md "Phase 4".
d /var/lib/jasper-intsecrets 2770 root jasper-intsecrets -
d /var/lib/jasper-intsecrets/spotify 2770 root jasper-intsecrets -
d /var/lib/jasper-intsecrets/spotify/caches 2770 root jasper-intsecrets -
