# /etc/tmpfiles.d/jts-mglru.conf
#
# Enable MGLRU (Multi-gen LRU) thrashing prevention.
#
# MGLRU has shipped on by default in the RPi kernel since 6.1.
# `min_ttl_ms` is the "thrashing prevention" knob (see kernel docs at
# docs.kernel.org/admin-guide/mm/multigen_lru.html): if a page has been
# accessed within the last N milliseconds, the reclaim algorithm
# protects it. When the kernel can't free enough cold pages to satisfy
# allocation pressure, it triggers OOM-kill instead of reclaiming
# recently-active pages and inducing thrash.
#
# Direct fix for the 2026-05-23 incident shape: a PIO compile pushed
# the box into zram-thrash for 2+ minutes because the kernel kept
# reclaiming pio's hot working set into zram, then immediately
# faulting it back in. With min_ttl_ms=1000 those pages stay
# protected, and the OOM killer fires within seconds.
#
# Value: 1000 ms is what pelwell empirically tested on Pi 4 with
# Chromium (forums.raspberrypi.com/viewtopic.php?t=344246) — too
# aggressive (>1500 ms on a 1 GB box) can cause spurious kills
# under normal load. Watch for OOM events in week 1 after PR1
# lands; reduce to 500 if anything legitimate is getting killed.
#
# Format: `w-` = write-if-exists (no-op if /sys/kernel/mm/lru_gen is
# absent on a kernel without MGLRU). Per systemd-tmpfiles(5).
w- /sys/kernel/mm/lru_gen/min_ttl_ms - - - - 1000
