# /etc/tmpfiles.d/jts-ring.conf
#
# The /dev/shm/jts-ring directory that holds the SHM slot rings — audio-graph
# consolidation P1. INERT in P1: the directory exists but no ring file is
# created inside it until a coupling arms (P2+). Shipped by
# deploy/lib/install/ring-platform.sh; see
# docs/HANDOFF-audio-graph-consolidation.md (phase map P1, "Permissions design
# point" in the renderer-ingress design section).
#
# Why a directory, and why it must persist across daemon restarts:
# the ring transport is SPSC — jasper-fanin WRITES a ring the CamillaDSP ioplug
# READS (Ring A), and the CamillaDSP ioplug WRITES a ring jasper-outputd READS
# (Ring B). The writer create-or-attaches the ring FILE under this directory;
# the reader attaches to the same file. The DIRECTORY must already exist and be
# writable by both, and it must survive an outputd (or camilla) restart so a
# bounce does not race directory re-creation — the ring-train guardrail that
# "SHM files survive outputd restart" depends on the directory being stable.
# /dev/shm is tmpfs (volatile), so the tmpfiles entry re-creates the directory
# on every boot; install.sh also applies it immediately so a deploy does not
# wait for a reboot.
#
# Permissions: mode 2775, owner root, group jasper.
#   - Group-write (775) + setgid (the leading 2) so a ring file created here by
#     one daemon is group-writable and group-inherited by the other. Both the
#     writer and the reader WRITE the ring header (the reader stamps read_seq +
#     heartbeat), so both need write access to a file the other created — the
#     EACCES class the on-Pi outputd bring-up hit.
#   - Group `jasper`: jasper-fanin and jasper-outputd run with Group=jasper
#     today (both run as root, primary group jasper); jasper-camilla runs as
#     root. Every existing shared JTS audio-daemon directory uses group `jasper`
#     (fanin/outputd RuntimeDirectoryMode=0750 root:jasper for their /run
#     socket dirs), and the lab ring-proto arm scripts validated root:jasper on
#     jts.local/jts3. This is forward-compatible with the WS1 privilege-
#     separation direction, where any future non-root ring daemon joins group
#     `jasper` (as voice/mux/etc. already do).
#
#   NOTE (divergence from the campaign plan doc): the plan's renderer-ingress
#   design section names "root:audio, 2775 or equivalent". This ships the "or
#   equivalent": group `jasper`, not `audio`. `audio` is the ALSA *device*-access
#   group (grants /dev/snd), which is orthogonal to SHM-file sharing; `jasper` is
#   the group the ring daemons already share and that the lab validated. This is
#   correct and reversible for P1..P5 (the only ring writers/readers today —
#   fanin, camilla, outputd — are all group `jasper`), and tmpfiles `d` re-applies
#   owner/group on every boot/apply, so flipping the dir group later is a one-line
#   change that self-heals.
#
#   The revisit is GUARANTEED at P6, not hypothetical: the plan's "Permissions
#   design point" (renderer-ingress section) names renderer users `shairport-sync`
#   and `pi` as ring-file creators at P6a-P6d (librespot/bluealsa/correction/
#   shairport → ring ingress), and those are classic `audio`-group members, not
#   `jasper`. At P6 the architect decides between two paths: add the renderer
#   users to group `jasper` (the WS1 privilege-separation direction — voice/mux/
#   etc. already share `jasper`), or flip THIS dir's group to `audio`. Do not
#   pre-decide it here; P1 has no renderer ring writers.
#
# Format per systemd-tmpfiles(5): `d` = create directory (and adjust its mode/
# owner/group if it already exists) at boot and on `--create`.
d /dev/shm/jts-ring 2775 root jasper -
