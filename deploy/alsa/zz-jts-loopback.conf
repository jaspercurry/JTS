# /etc/alsa/conf.d/zz-jts-loopback.conf — installed by deploy/install.sh.
#
# Why this file exists:
# moOde's web UI doesn't allow selecting the snd-aloop Loopback device as
# the Output device — picking it raises "Device is reserved and cannot be
# selected for output". (moOde reserves Loopback for its own ALSA Loopback
# *toggle* feature, which mirrors output to a sniff target.) BUT we need
# a different shape: all renderers must write INTO Loopback so our
# externally-managed CamillaDSP can capture from it and own the DAC.
#
# So we sidestep the UI guard at the ALSA layer.
#
# moOde owns /etc/alsa/conf.d/_audioout.conf, which defines pcm._audioout
# pointing at the user-selected physical Output device (e.g. plughw:2,0).
# Every moOde renderer (MPD, shairport-sync, librespot, bluealsa-aplay)
# writes to pcm._audioout. We override that symbol here.
#
# - The `zz-` filename prefix ensures this file loads AFTER moOde's
#   _audioout.conf. ASCII sort: digits (48-57) < underscore (95) <
#   lowercase a-z (97-122). A digit prefix would load BEFORE
#   `_audioout.conf` and lose; lowercase letters load AFTER and win.
#   `zz-` is conventional for "load last" overrides.
# - The `pcm.!_audioout` syntax is ALSA's force-redefine — it replaces
#   any earlier definition of pcm._audioout.
# - `type plug` in front of Loopback handles rate/format/channel
#   conversion if a renderer writes something narrower than Loopback's
#   first-opener-locked rate.
#
# Required moOde UI settings for this to work (Configure → Audio):
#   - CamillaDSP: Off  (Custom mode would re-route _audioout through
#     moOde's pcm.camilladsp ioplug, fighting our jasper-camilla)
#   - Output device: any physical device  (irrelevant — we hijack)
#   - Loopback toggle (in ALSA Options): OFF  (would create its own
#     pcm.!_audioout and conflict with this file)
#   - Volume type: Software  (CamillaDSP volume type is unavailable when
#     CamillaDSP=Off; jasper-camilla owns ducking via master_gain)
#
# Required moOde MPD options (Configure → Audio → MPD):
#   - SoX Resampling: Enabled, 48000 Hz, 16-bit, 2 channels.
#     Loopback locks rate at first opener; resampling 48 kHz on the
#     writer side prevents broken-pipe events on track changes.

pcm.!_audioout {
    type plug
    slave.pcm "hw:Loopback,0,0"
}
