# JTS SHM slot-ring ALSA device definitions — audio-graph consolidation P1.
#
# Ships the two `jts_ring` ioplug PCMs as PRODUCT devices, but INERT: after
# P1 every box carries these definitions, yet NOTHING opens them. The default
# fan-in->CamillaDSP coupling stays `loopback` and the default CamillaDSP->outputd
# content bridge stays `direct`, so audio behaviour is byte-identical to a box
# without this file. P2 (ring citizenship) wires emitters + the coupling
# reconciler to actually open these; see
# docs/HANDOFF-audio-graph-consolidation.md (phase map P1/P2, section I item 2).
#
# Renderer-user resolvability (AGENTS.md, the PR #214 class): this is a
# system-wide /etc/alsa/conf.d/*.conf drop-in at mode 0644, so ANY user —
# including the CamillaDSP runtime user and the non-root renderer users
# (shairport-sync, pi) — can resolve these PCM names. bluealsa and jack already
# register PCMs from this same directory on the Pi. jasper-doctor's
# `check_renderer_device_resolvable` and the new `check_ring_platform_assets`
# codify the open probe.
#
# The ioplug .so (libasound_module_pcm_jts_ring.so) is compiled on the Pi from
# c/jts-ring-ioplug and installed to the arch ALSA plugin dir by
# deploy/lib/install/ring-platform.sh. `type jts_ring` resolves to it.
#
# Geometry note: period_frames / n_slots below match the compiled ioplug
# defaults and the Rust ring-writer/reader defaults documented in
# rust/jasper-fanin/src/config.rs (Ring A path program.ring, default 8 slots)
# and rust/jasper-outputd/src/config.rs (Ring B path content.ring, default 2
# slots, DEFAULT_SHM_RING_PATH). These are placeholders that make the names
# RESOLVE for the inert phase; the real live geometry is emitted by P2's
# CamillaDSP config carrier + the coupling reconciler, which own the ring
# path/slots/period as a matched set at arm time. Do not treat these values as
# the production geometry — they exist so `aplay -L` / an open probe succeeds
# while nothing feeds or drains the ring.

# Ring A — CamillaDSP CAPTURES this: the ioplug READS the SHM ring that
# jasper-fanin writes (fan-in -> CamillaDSP hop). Path matches jasper-fanin's
# JASPER_FANIN_RING_PATH default.
pcm.jts_ring_capture {
    type jts_ring
    path "/dev/shm/jts-ring/program.ring"
    period_frames 128
    n_slots 8
}

# Ring B — CamillaDSP WRITES this: the ioplug WRITES the SHM ring that
# jasper-outputd reads (CamillaDSP -> outputd hop). Path matches
# jasper-outputd's DEFAULT_SHM_RING_PATH.
pcm.jts_ring_playback {
    type jts_ring
    path "/dev/shm/jts-ring/content.ring"
    period_frames 128
    n_slots 2
}
