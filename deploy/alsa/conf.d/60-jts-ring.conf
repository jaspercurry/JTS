# JTS SHM slot-ring ALSA device definitions.
#
# Ships the two `jts_ring` ioplug PCMs as PRODUCT devices. The definitions are
# safe to install on every box, but only the coupling reconciler opens them: on a
# ring-eligible solo box it arms `JASPER_FANIN_CAMILLA_COUPLING=shm_ring` plus
# `JASPER_OUTPUTD_CONTENT_BRIDGE=shm_ring`; otherwise the historical loopback /
# direct topology remains active.
#
# Renderer-user resolvability (AGENTS.md, the PR #214 class): this is a
# system-wide /etc/alsa/conf.d/*.conf drop-in at mode 0644, so ANY user —
# including the CamillaDSP runtime user and the non-root renderer users
# (shairport-sync, pi) — can resolve these PCM names. bluealsa and jack already
# register PCMs from this same directory on the Pi. jasper-doctor's
# `check_renderer_device_resolvable` and the new `check_ring_platform_assets`
# codify the open probe.
#
# The ioplug .so (libasound_module_pcm_jts_ring.so) is compiled on the Pi from
# c/jts-ring-ioplug and installed to the arch ALSA plugin dir by
# deploy/lib/install/ring-platform.sh. `type jts_ring` resolves to it.
#
# Geometry note: period_frames / n_slots below are the production defaults for
# the low-latency ring graph. Ring A (program.ring, fan-in -> CamillaDSP) and
# Ring B (content.ring, CamillaDSP -> outputd) are both at the 2-slot floor.
# With 128-frame slots, Ring A contributes 2 x 128 / 48000 ~= 5.3 ms; the old
# 8-slot geometry paid ~=21 ms because the blocking-writer handshake pins fill at
# capacity. The paired CamillaDSP ring config is chunk 128 / target 128 /
# queuelimit 1; chunk 256 would span the entire 2-slot buffer.
#
# period_frames MATCHING (P2): the ring slot IS one outputd DAC period — the
# `jts_ring_playback` ioplug opens Ring B with the period_frames below, and
# jasper-outputd's ShmRingSource attaches with its resolved
# JASPER_OUTPUTD_PERIOD_FRAMES. A mismatch is a hard ioplug open() error. The
# packaged period is 1024 (only the Apple-dongle latency floor is 128), so the
# static 128 here is NOT universally correct. The coupling reconciler
# PREFLIGHTs this at arm time: `ring_geometry_ready` refuses shm_ring (fail-safe
# to loopback) with a crisp "conf.d period N != outputd period M" reason when
# they diverge, rather than letting CamillaDSP's ring open fail with a confusing
# rollback. To arm on a box whose outputd period != 128, set the conf.d period
# below to match outputd's resolved period (or vice versa) — a per-box conf.d
# render remains a follow-up for non-Apple floors.

# Ring A — CamillaDSP CAPTURES this: the ioplug READS the SHM ring that
# jasper-fanin writes (fan-in -> CamillaDSP hop). Path matches jasper-fanin's
# JASPER_FANIN_RING_PATH default.
pcm.jts_ring_capture {
    type jts_ring
    path "/dev/shm/jts-ring/program.ring"
    period_frames 128
    n_slots 2
}

# Ring B — CamillaDSP WRITES this: the ioplug WRITES the SHM ring that
# jasper-outputd reads (CamillaDSP -> outputd hop). Path matches
# jasper-outputd's DEFAULT_SHM_RING_PATH.
pcm.jts_ring_playback {
    type jts_ring
    path "/dev/shm/jts-ring/content.ring"
    period_frames 128
    n_slots 2
}
