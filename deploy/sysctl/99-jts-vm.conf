# /etc/sysctl.d/99-jts-vm.conf
#
# JTS smart-speaker virtual-memory tunings for low-RAM ARM (Pi 5 1 GB).
# Stage 1 of the memory-resilience plan — works on stock kernel, no
# cgroup-memory enablement required. Each knob is justified below;
# don't shotgun-tune. See docs/HANDOFF-resilience.md "Memory-pressure
# resilience" for the full rationale.

# vm.swappiness — bias the reclaim algorithm between anon (swap) and
# file cache. Default 60 is calibrated for systems where "swap" is
# slow disk. Here "swap" is zram (compressed RAM, decompresses at
# GiB/s on ARM), so anon-evict is *cheaper* than file-cache-evict
# relative to disk-swap assumptions. Fedora ships 180 on zram-only
# desktops; we pick 100 as a conservative middle because audio
# jitter from zram decompression is the dominant risk on this box —
# we'd rather evict file cache (re-readable from SD) than swap anon
# pages (decompression latency hits the audio path). Revisit if Stage
# 3 soak shows no xrun spike at 150.
vm.swappiness = 100

# vm.page-cluster — read-ahead pages on swap-in. Default 3 = 8 pages
# brought in per swap fault. Zram has no spatial locality (compressed
# blocks aren't sequential), so reading 8 just wastes RAM. 0 = read
# exactly one page per fault. Universal recommendation for zram-only
# systems (Pop!_OS, Fedora, Arch, openSUSE all converge here).
vm.page-cluster = 0

# vm.watermark_scale_factor — wake kswapd this many tenths-of-a-percent
# below high-water. Default 10 (0.1%) is calibrated for systems with
# ample slack; on a 991 MB box 0.1% is ~1 MB, which kswapd burns
# through in milliseconds under burst load → reclaim becomes bursty
# rather than smooth. 125 (1.25%, ~12 MB) gives kswapd a wider
# operating window before direct-reclaim kicks in. Pop!_OS default
# for zram-tuned configs.
vm.watermark_scale_factor = 125

# vm.watermark_boost_factor — fights with watermark_scale_factor by
# temporarily inflating the high-water on fragmentation events.
# Helpful on systems with huge pages; counterproductive when paired
# with a tuned scale_factor. 0 disables. Pop!_OS default.
vm.watermark_boost_factor = 0

# vm.min_free_kbytes — kernel's reserved memory floor (never given
# to userspace, available for atomic allocations + OOM-killer ops).
#
# THIS VALUE IS COMPUTED PER-PI BY install.sh's migrate_memory_resilience.
# Formula: clamp(0.02 × MemTotal_kB, 8192, 262144) — 2% of total RAM,
# with an 8 MB floor (matches Raspberry Pi Foundation's default —
# never reduce below) and a 256 MB ceiling (so a 16 GB Pi doesn't
# reserve unreasonably much). Resolved values:
#   1 GB  Pi  →  20 MB (2%)
#   2 GB  Pi  →  40 MB (2%)
#   4 GB  Pi  →  80 MB (2%)
#   8 GB  Pi  →  160 MB (2%)
#   16 GB Pi  →  256 MB (capped)
#
# 2% is in the safe band per Linux Hint guidance ("5–10% causes
# system to OOM immediately") and aligns with Pop!_OS's runtime
# safeguard pattern (PR pop-os/default-settings#163) of ensuring
# ≥1% of RAM is reserved. Arch BBS thread #293444 documented
# multi-second freezes when this is too low (typically <1%); 2%
# gives kswapd enough operating room without capping userspace
# memory hard.
#
# The __VM_MIN_FREE_KBYTES__ placeholder below is substituted at
# install time. If you see the placeholder in /etc/sysctl.d/, the
# template wasn't processed — re-run install.sh.
vm.min_free_kbytes = __VM_MIN_FREE_KBYTES__

# vm.dirty_background_ratio — % of RAM of dirty pages before kernel
# starts async writeback. Default 10 = 99 MB of pending writes
# accumulating before flush, which on SD-card storage means a long
# stall during fsync. Lower (2%) flushes more aggressively but in
# smaller batches → less stall time per fsync.
vm.dirty_background_ratio = 2

# vm.dirty_ratio — % of RAM at which writes block waiting for
# flush. Default 20. On SD, a 200 MB dirty-page backlog means the
# blocking write stalls for many seconds. 10% (~99 MB) is a
# better embedded ceiling.
vm.dirty_ratio = 10

# vm.vfs_cache_pressure — bias on fs metadata cache (inodes/dentries)
# vs page cache. Default 100 = equal weight. JTS re-traverses the
# same small fs tree every boot and doesn't open lots of new files
# under load; metadata cache rarely earns its keep. 200 biases
# toward freeing it. Going much higher (>500) wastes CPU searching
# for freeable objects per Arch BBS consensus.
vm.vfs_cache_pressure = 200

# vm.overcommit_memory — left at default 0 (heuristic). Mode 1
# (always overcommit) hides real OOM; mode 2 (strict) breaks
# Python's fork+exec pattern. Pinned here as documentation that
# this is a *deliberate* default, not a forgotten knob.
vm.overcommit_memory = 0
