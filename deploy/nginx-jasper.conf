# Reverse-proxy /spotify/ → jasper-web service on 127.0.0.1:8765.
#
# Installed as a *.conf snippet under /etc/nginx/conf.d/ so it's
# included by moOde's existing nginx site config without us having
# to edit moOde-owned files.
#
# Path mapping: nginx strips /spotify/ before proxying, so the app
# sees /, /start, /callback, /remove, /default. The proxied app's
# self-emitted relative URLs ("./") therefore resolve correctly under
# the /spotify/ public prefix.

location /spotify/ {
    proxy_pass http://127.0.0.1:8765/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # OAuth flows redirect to absolute URLs; no buffering.
    proxy_buffering off;
    proxy_redirect off;
}
