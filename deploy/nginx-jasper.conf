# Reverse-proxy /spotify/ → jasper-web service on 127.0.0.1:8765
# and /dial/ → jasper-dial-web on 127.0.0.1:8766.
#
# Installed as a *.conf snippet under /etc/nginx/conf.d/ so it's
# included by moOde's existing nginx site config without us having
# to edit moOde-owned files.
#
# Path mapping: nginx strips the location prefix before proxying, so
# each backend app sees its own / root. Backend apps emit relative
# links ("./") which resolve correctly under the public prefix.

location /spotify/ {
    proxy_pass http://127.0.0.1:8765/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # OAuth flows redirect to absolute URLs; no buffering.
    proxy_buffering off;
    proxy_redirect off;
}

location /dial/ {
    proxy_pass http://127.0.0.1:8766/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # POST /onboard runs jasper-dial-onboard which can take 30-90s
    # (flash + improv handshake + mDNS wait). Bump the read timeout
    # so the browser doesn't see a 504 mid-provision.
    proxy_read_timeout 240s;
    proxy_buffering off;
    proxy_redirect off;
}
