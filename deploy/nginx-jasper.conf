# JTS nginx site — serves /spotify/ (multi-account OAuth web flow),
# /voice/ (voice-provider config wizard), and /dial/ (rotary-dial
# onboarding) over plain HTTP on jts.local.
#
# Installed to /etc/nginx/sites-enabled/jasper.conf by install.sh.
#
# Why plain HTTP (no TLS): Spotify post-November-2025 requires HTTPS
# for OAuth redirect URIs, but a self-signed cert on a home Pi throws
# scary "connection not private" warnings on every browser. We side-
# step the cert problem by terminating Spotify's HTTPS requirement at
# a static GitHub Pages bounce page (oauth-callback/index.html in this
# repo) and then doing the rest over plain HTTP. See
# docs/multi-user-spotify.md "OAuth flow" for the full sequence.
#
# /voice/ and /dial/ are LAN-only management pages — fine on HTTP for
# the same reason any home-router admin page is on HTTP. No
# credentials cross the wire after wizard setup.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    location /spotify/ {
        proxy_pass http://127.0.0.1:8765/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # OAuth flows redirect to absolute URLs; no buffering.
        proxy_buffering off;
        proxy_redirect off;
    }

    location /voice/ {
        # Voice-provider config wizard (Gemini / OpenAI / Grok keys +
        # active provider selection). Same jasper-web Python process
        # as /spotify/ but a separate ThreadingHTTPServer thread on
        # port 8767. See jasper/web/voice_setup.py and
        # docs/HANDOFF-voice-providers.md.
        proxy_pass http://127.0.0.1:8767/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_redirect off;
    }

    location /dial/ {
        proxy_pass http://127.0.0.1:8766/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # POST /onboard runs jasper-dial-onboard which can take 30-90s
        # (flash + improv handshake + mDNS wait). Bump the read timeout
        # so the browser doesn't see a 504 mid-provision.
        proxy_read_timeout 240s;
        proxy_buffering off;
        proxy_redirect off;
    }

    location / {
        return 404;
    }
}
