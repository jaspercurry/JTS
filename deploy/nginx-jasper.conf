# JTS nginx site — serves /spotify/ (multi-account OAuth web flow),
# /voice/ (voice-provider config wizard), /dial/ (rotary-dial
# onboarding), and /google/ (Calendar + Gmail OAuth wizard) on plain
# HTTP. /correction/ starts with a plain-HTTP preflight page, then its
# measurement UI switches to HTTPS because browser mic capture requires
# a secure context.
#
# Installed to /etc/nginx/sites-enabled/jasper.conf by install.sh.
#
# Why plain HTTP for the legacy routes: Spotify post-November-2025
# requires HTTPS for OAuth redirect URIs, but a self-signed cert on a
# home Pi throws scary "connection not private" warnings. We side-step
# Spotify's HTTPS requirement by terminating it at a static GitHub
# Pages bounce page (separate public repo jaspercurry/spotify-oauth-
# callback). /voice/ and /dial/ are LAN-only management pages — fine
# on HTTP for the same reason any home-router admin page is on HTTP.
# No credentials cross the wire after wizard setup. See
# docs/multi-user-spotify.md "OAuth flow" for the full Spotify
# sequence.
#
# Why HTTPS is added back for the correction measurement UI:
# getUserMedia requires a secure context (HTTPS or localhost) — there
# is no way to capture microphone audio from jts.local over HTTP.
# install.sh provisions a private CA at /var/lib/jasper/ca and a server
# cert at /etc/nginx/ssl/jts.local.{crt,key}. The CA cert is published
# at http://jts.local/jts-root-ca.crt so iOS can install + trust it
# before HTTPS works (chicken-and-egg). One-time iOS dance documented
# in BRINGUP.md.
#
# See docs/HANDOFF-correction.md for the full architecture and the
# phased plan that drives the /correction/ surface.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Landing page at /. Static HTML installed by install.sh to
    # /usr/share/jasper-web/index.html. The exact-match `=` priority
    # lets the catch-all 404 below stay in place for everything else.
    location = / {
        root /usr/share/jasper-web;
        try_files /index.html =404;
    }

    # Local static assets for the management landing page. Fonts are
    # cacheable and served from the Pi, avoiding external Google Fonts
    # requests on LAN-only admin pages.
    #
    # Page ES modules (/assets/<page>/js/*.js) are the one exception to
    # the immutable rule below: they import each other by relative path,
    # so we can't cache-bust the URL the way app.css is (?v=<sha>). Serve
    # them with revalidation instead — nginx's ETag + a conditional GET
    # yields a 304 when unchanged and picks up new code on the next deploy
    # without ever serving a stale module. This regex location takes
    # precedence over the prefix /assets/ block for .js only; fonts and
    # app.css stay immutable.
    location ~* ^/assets/.+\.js$ {
        root /usr/share/jasper-web;
        try_files $uri =404;
        add_header Cache-Control "no-cache";
    }
    location /assets/ {
        root /usr/share/jasper-web;
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /spotify/ {
        proxy_pass http://127.0.0.1:8765/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # OAuth flows redirect to absolute URLs; no buffering.
        proxy_buffering off;
        proxy_redirect off;
    }

    location /voice/ {
        # Voice-provider config wizard (Gemini / OpenAI / Grok keys +
        # active provider selection). Same jasper-web Python process
        # as /spotify/ but a separate ThreadingHTTPServer thread on
        # port 8767. See jasper/web/voice_setup.py and
        # docs/HANDOFF-voice-providers.md.
        proxy_pass http://127.0.0.1:8767/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_redirect off;
    }

    location /dial/ {
        proxy_pass http://127.0.0.1:8766/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # POST /onboard runs jasper-dial-onboard which can take 30-90s
        # (flash + improv handshake + mDNS wait). Bump the read timeout
        # so the browser doesn't see a 504 mid-provision.
        proxy_read_timeout 240s;
        proxy_buffering off;
        proxy_redirect off;
    }

    location /google/ {
        # Google OAuth wizard (per-household-member Calendar + Gmail
        # account linking). HTTP, not HTTPS — Google won't accept
        # `.local` mDNS hostnames as OAuth redirect URIs at all, so
        # we use a GitHub Pages bounce page (the Spotify pattern):
        # bounce repo `jaspercurry/google-oauth-callback` reads
        # ?host=jts.local and redirects to http://jts.local/google/callback.
        # See jasper/web/google_setup.py.
        proxy_pass http://127.0.0.1:8768/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # OAuth callback redirects to absolute Google URLs; no buffering.
        proxy_buffering off;
        proxy_redirect off;
    }

    location /airplay/ {
        # AirPlay sync-mode toggle (free-running vs synced). Same
        # jasper-web Python process as /spotify/ but a separate
        # ThreadingHTTPServer thread on port 8771. See
        # jasper/web/airplay_setup.py for the UX and the rationale
        # behind the free-running default.
        proxy_pass http://127.0.0.1:8771/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_redirect off;
    }

    location /bluetooth/ {
        # Generic Bluetooth control panel — Powered + pairing-mode
        # toggles, live device list, pair/connect/forget any BT device
        # (phones for music, knobs for control, etc.).
        # SSE streams (/devices/stream and /pair/<mac>/stream) need
        # buffering off so events reach the browser live. Pair attempts
        # can take up to the BlueZ timeout, so bump the read timeout the
        # same way /dial/ does.
        proxy_pass http://127.0.0.1:8769/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 240s;
        proxy_buffering off;
        proxy_redirect off;
    }

    location /sources/ {
        # Audio source on/off toggles (AirPlay / Bluetooth / Spotify
        # Connect). Same jasper-web Python process as /spotify/ but a
        # separate ThreadingHTTPServer thread on port 8773. See
        # jasper/web/sources_setup.py.
        proxy_pass http://127.0.0.1:8773/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_redirect off;
    }

    location /sound/ {
        # Sound curve + preference EQ. Same jasper-web Python process
        # as /spotify/, separate ThreadingHTTPServer thread on port
        # 8784. Emits generated CamillaDSP configs and preserves active
        # room-correction PEQs when applying. See jasper/web/sound_setup.py.
        proxy_pass http://127.0.0.1:8784/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_redirect off;
    }

    location /speaker/ {
        # Speaker display-name wizard. One name feeds AirPlay, Spotify
        # Connect, Bluetooth, and USB Audio. Same jasper-web Python
        # process as /spotify/, separate ThreadingHTTPServer thread on
        # port 8783. See jasper/web/speaker_setup.py.
        proxy_pass http://127.0.0.1:8783/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_redirect off;
    }

    location /wake/ {
        # Wake-word page — model picker (radio over the curated
        # registry in jasper/wake_models.py) plus detection layers
        # (AEC + raw + DTLN toggles) and sensitivity slider. The
        # layer + sensitivity routes proxy upstream to jasper-control
        # at 127.0.0.1:8780 (/aec, /aec/toggle, /aec/leg,
        # /aec/threshold). Same jasper-web Python process as
        # /spotify/, separate ThreadingHTTPServer thread on port
        # 8774. See jasper/web/wake_setup.py.
        proxy_pass http://127.0.0.1:8774/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_redirect off;
    }

    location /wake-corpus/ {
        # Wake-word corpus recorder — browser-driven recording UI for
        # the Phase 0b gold-corpus protocol (docs/HANDOFF-wake-training-
        # experiment.md). Same jasper-web Python process as /spotify/,
        # separate ThreadingHTTPServer thread on port 8782. See
        # jasper/web/wake_corpus_setup.py.
        #
        # Records audio via UDP from jasper-aec-bridge's :9876/:9877/
        # :9878 streams. Requires jasper-voice to be stopped (the UI
        # has a button for this); the recorder daemon shells out to
        # systemctl on behalf of the operator.
        #
        # proxy_read_timeout is bumped to 1 hour because a single
        # recording session may stay open without browser idle (the
        # daemon's idle tracker tracks HTTP requests, but a long
        # quiet stretch within the WAV-serving phase could hit the
        # default 60s timeout). HTML5 audio elements re-request
        # WAVs separately and complete quickly.
        proxy_pass http://127.0.0.1:8782/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_redirect off;
        proxy_read_timeout 3600s;
    }

    location /wifi/ {
        # Wi-Fi network management — scan, connect, forget. Same
        # jasper-web Python process as /spotify/ but a separate
        # ThreadingHTTPServer thread on port 8775. Backed by `nmcli`
        # subprocess calls. See jasper/web/wifi_setup.py.
        #
        # POST /connect runs `nmcli --wait 30 dev wifi connect` and
        # may do a rollback `nmcli --wait 20 connection up` after
        # that — worst-case ~50 s for both legs. The Pi will also
        # have lost connectivity briefly during the swap. Bump the
        # read timeout the same way /bluetooth/ does for its pair
        # flow so the browser doesn't see a 504 mid-connect.
        proxy_pass http://127.0.0.1:8775/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_buffering off;
        proxy_redirect off;
    }

    location /peers/ {
        # Multi-device peering — toggle, room label, primary flag.
        # Same jasper-web Python process as /spotify/, separate
        # ThreadingHTTPServer thread on port 8776. Save triggers
        # `systemctl restart jasper-voice` AND `systemctl restart
        # jasper-control` (both daemons read JASPER_PEERING at
        # startup; live-toggle without restart would be much more
        # plumbing). See jasper/web/peering_setup.py.
        proxy_pass http://127.0.0.1:8776/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_redirect off;
    }

    location /transit/ {
        # Transit setup wizard — geocode an address via OSM Nominatim,
        # find nearest subway/bus stops, configure stop IDs + BusTime
        # API key. Same jasper-web Python process as /spotify/, separate
        # ThreadingHTTPServer thread on port 8777. The /geocode POST
        # makes a synchronous Nominatim call; the /save POST may probe
        # BusTime to validate a key — bump proxy_read_timeout so the
        # browser doesn't 504 mid-flow on a slow geocoder day.
        proxy_pass http://127.0.0.1:8777/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_buffering off;
        proxy_redirect off;
    }

    location /weather/ {
        # Weather default-location wizard — geocode a default location
        # and choose temperature units for bare weather questions. Same
        # jasper-web Python process as /spotify/, separate
        # ThreadingHTTPServer thread on port 8779. Explicit city/place
        # weather questions are resolved dynamically by the voice tool;
        # this page only owns the default.
        proxy_pass http://127.0.0.1:8779/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_buffering off;
        proxy_redirect off;
    }

    location /ha/ {
        # Home Assistant connection wizard — mDNS discovery + LLAT paste
        # + agent picker. Same jasper-web process, separate
        # ThreadingHTTPServer thread on port 8778. /discover runs a ~4 s
        # mDNS browse; /verify hits the configured HA at GET /api/.
        # Bumped proxy_read_timeout so the browser doesn't 504 if HA
        # is slow to respond. See docs/HANDOFF-homeassistant.md.
        proxy_pass http://127.0.0.1:8778/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_buffering off;
        proxy_redirect off;
    }

    location /system/ {
        # System dashboard — RAM/CPU/temp/disk sparklines, cloud
        # activity (per-provider sessions/tokens/cost), restart and
        # diagnostics buttons. Socket-activated like the other
        # wizards; the daemon idle-exits after 30 min of no requests.
        # jasper-doctor proxied through /system/diagnostics.json can
        # take ~5 s — bump proxy_read_timeout to match.
        proxy_pass http://127.0.0.1:8772/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_redirect off;
    }

    location /volume {
        # jasper-control volume endpoints — GET /volume, POST
        # /volume/{set,adjust,mute}. Same daemon the dial talks to
        # directly on :8780; nginx proxy gives the landing-page
        # slider a same-origin path so it doesn't need CORS. No
        # trailing slash on location OR proxy_pass forwards the URI
        # verbatim, so this one rule covers GET /volume and POST
        # /volume/set in one location block.
        proxy_pass http://127.0.0.1:8780;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    location /mic {
        # jasper-control mic mute endpoints — GET /mic, POST /mic/mute.
        # Same proxy pattern as /volume: routes to the control daemon
        # on :8780 so the landing-page mic toggle stays same-origin.
        # The daemon talks to jasper-voice's UDS control socket which
        # drops mic frames at the wake-loop gate.
        proxy_pass http://127.0.0.1:8780;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    location /source {
        # jasper-control source-selection endpoints — GET /source/state,
        # POST /source/select. Singular /source is deliberate: /sources/
        # remains the on/off wizard; this is the lightweight landing-page
        # selector for which enabled renderer lane the speaker should play.
        proxy_pass http://127.0.0.1:8780;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    location /debug {
        # jasper-control runtime debug-logging toggle — GET /debug,
        # POST /debug. Same :8780 proxy pattern as /mic and /volume so
        # the /system Debug card (served from :8772, which idle-exits)
        # can reach the long-lived control daemon that owns the
        # toggle's auto-expiry timer.
        proxy_pass http://127.0.0.1:8780;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # Plain-HTTP entry point for room correction. This page explains why
    # the next click changes schemes and may show the browser's
    # self-signed-certificate warning before switching to the HTTPS-only
    # correction surface.
    location = /correction {
        return 308 /correction/;
    }

    location = /correction/ {
        root /usr/share/jasper-web;
        try_files /correction-preflight.html =404;
    }

    # CA cert download for the /correction/ HTTPS flow. Served on
    # plain HTTP because the user can't trust HTTPS until they have
    # this file installed — chicken-and-egg. install.sh copies the
    # cert here from /var/lib/jasper/ca/ca.crt. application/x-x509-ca-cert
    # is the MIME type iOS Safari recognizes to offer the "Install
    # profile" prompt.
    location = /jts-root-ca.crt {
        root /usr/share/jasper-web;
        try_files /jts-root-ca.crt =404;
        types { } default_type application/x-x509-ca-cert;
        add_header Content-Disposition 'attachment; filename="jts-root-ca.crt"';
    }

    location / {
        return 404;
    }
}

# HTTPS server block — /correction/ measurement UI only. getUserMedia
# (mic capture) requires a secure context, so the correction app is the
# one route that has to be HTTPS. The other routes stay on port 80 —
# no point breaking them just because one feature needs TLS.
#
# Do not add HSTS here. This speaker deliberately has split HTTP/HTTPS
# surfaces; HSTS would teach browsers to upgrade every JTS route to
# HTTPS and strand the plain-HTTP wizards behind the 443 catch-all.
#
# Cert chain: install.sh generates a private CA at
# /var/lib/jasper/ca/ca.{crt,key} on first run and a server cert at
# /etc/nginx/ssl/jts.local.{crt,key} on every install. The user
# installs ca.crt on their iPhone once.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/jts.local.crt;
    ssl_certificate_key /etc/nginx/ssl/jts.local.key;

    # Modern-only — every device that's going to use this is iOS 16+
    # or a recent macOS/Chrome. No TLS 1.0/1.1 / RC4 / SHA1 baggage.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:JtsSSL:10m;
    ssl_session_tickets off;

    location /correction/ {
        proxy_pass http://127.0.0.1:8770/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # A measurement capture WAV (sweep + pre/post-roll, 48 kHz 16-bit
        # mono) runs ~1-2 MB, well over nginx's 1 MB default — without this
        # the upload 413s before reaching the backend. Match the backend cap
        # (MAX_WAV_BODY_BYTES = 32 MB in jasper/web/correction_setup.py) so a
        # single effective limit is enforced by the app with a clean error.
        client_max_body_size 32m;
        # The correction wizard uploads captures and polls /status
        # while sweeps/filter work are in flight. Keep buffering off
        # and the read timeout long so mobile Safari does not hit a
        # proxy timeout mid-session.
        proxy_buffering off;
        proxy_read_timeout 600s;
    }

    # Static assets for the canonical look, mirrored from the port-80
    # block. The /correction/ measurement UI is the one wizard served over
    # HTTPS (getUserMedia needs a secure context) and it links
    # /assets/app.css + its ES module by absolute path. Without these
    # blocks those subresource requests fall through to the catch-all
    # below and 308 down to HTTP — which browsers block as mixed content,
    # leaving the page unstyled and its JS (mic capture, sweep) dead.
    # Keep the caching identical to port 80: JS revalidates (a
    # relative-import module graph can't be URL-cache-busted), app.css and
    # fonts stay immutable and are SHA-busted via ?v=.
    location ~* ^/assets/.+\.js$ {
        root /usr/share/jasper-web;
        try_files $uri =404;
        add_header Cache-Control "no-cache";
    }
    location /assets/ {
        root /usr/share/jasper-web;
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Catch-all for accidental HTTPS navigation to the HTTP-only
    # wizards. This still does not expose any extra upstreams via 443:
    # nginx downgrades the request back to the normal port-80 surface,
    # whose own route table decides whether it is valid or 404.
    location / {
        return 308 http://$host$request_uri;
    }
}
