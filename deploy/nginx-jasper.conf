# JTS nginx site — serves /spotify/ (multi-account OAuth web flow),
# /voice/ (voice-provider config wizard), /google/ (Google Calendar +
# Gmail OAuth wizard), and /dial/ (rotary-dial onboarding) over HTTPS.
#
# Installed to /etc/nginx/sites-enabled/jasper.conf by install.sh.
# Self-signed cert at /etc/nginx/ssl/jasper.{crt,key} generated by
# install_self_signed_cert. Each phone clicks through the cert
# warning once.
#
# Why HTTPS for /spotify/: Spotify (post-2024) rejects non-loopback
# redirect URIs unless they're served over TLS. The phone-side OAuth
# bounce lands at https://<host>/spotify/callback.
#
# /dial/ doesn't strictly need TLS but lives on the same host so
# it inherits the cert. Browsers visiting plain-HTTP get 301'd up.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    http2 on;
    server_name _;

    ssl_certificate /etc/nginx/ssl/jasper.crt;
    ssl_certificate_key /etc/nginx/ssl/jasper.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:1m;
    ssl_session_timeout 1d;

    location /spotify/ {
        proxy_pass http://127.0.0.1:8765/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # OAuth flows redirect to absolute URLs; no buffering.
        proxy_buffering off;
        proxy_redirect off;
    }

    location /voice/ {
        # Voice-provider config wizard (Gemini / OpenAI / Grok keys +
        # active provider selection). Same jasper-web Python process
        # as /spotify/ but a separate ThreadingHTTPServer thread on
        # port 8767. See jasper/web/voice_setup.py and
        # docs/HANDOFF-voice-providers.md.
        proxy_pass http://127.0.0.1:8767/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_redirect off;
    }

    location /google/ {
        # Google OAuth wizard (per-household-member Calendar + Gmail
        # account linking). Same jasper-web Python process as the
        # other wizards; separate ThreadingHTTPServer thread on
        # port 8768. See jasper/web/google_setup.py.
        proxy_pass http://127.0.0.1:8768/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # OAuth callback redirects to absolute Google URLs; no buffering.
        proxy_buffering off;
        proxy_redirect off;
    }

    location /dial/ {
        proxy_pass http://127.0.0.1:8766/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # POST /onboard runs jasper-dial-onboard which can take 30-90s
        # (flash + improv handshake + mDNS wait). Bump the read timeout
        # so the browser doesn't see a 504 mid-provision.
        proxy_read_timeout 240s;
        proxy_buffering off;
        proxy_redirect off;
    }

    location / {
        return 404;
    }
}
