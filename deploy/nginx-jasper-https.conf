# HTTPS server block for jasper.local — serves the /spotify setup
# flow over TLS so Spotify will accept it as a redirect URI (post-2024
# rules require HTTPS for any non-loopback redirect host).
#
# Self-signed cert: each phone clicks through a "not-trusted" warning
# the first time it visits https://jasper.local/spotify. After that,
# the browser remembers the exception (or the cert can be installed
# system-wide on the device for zero warnings).
#
# Lives in /etc/nginx/sites-enabled/jasper-https.conf — alongside
# moOde's moode-http.conf, but on a different port. moOde's HTTP
# surface on port 80 is unaffected.

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name jasper.local jasper;

    ssl_certificate /etc/nginx/ssl/jasper.crt;
    ssl_certificate_key /etc/nginx/ssl/jasper.key;

    # Reasonable defaults — minimal, don't pull in moOde's ssl.conf
    # which may have broader settings than we want.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:1m;
    ssl_session_timeout 1d;

    # /spotify/ proxies to jasper-web on 127.0.0.1:8765.
    include /etc/nginx/jasper-locations.conf;

    # Anything else just redirects to the HTTP moOde UI on this host.
    # We don't try to serve moOde over HTTPS — that's moOde's call,
    # and dragging moOde behind self-signed certs would be unfriendly
    # to its existing users / mobile-app integrations.
    location / {
        return 302 http://$host$request_uri;
    }
}
