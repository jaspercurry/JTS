# /etc/rpi/swap.conf.d/50-jts.conf
#
# JTS zram sizing + compression-algorithm choice. Drop-in for the
# rpi-swap package (Trixie default; replaces dphys-swapfile).
#
# Reduces zram from its default 100% of RAM (an inheritance from old
# zramswap defaults) to 50% of RAM. The 2026-05-23 incident showed
# that 990 MB zram on 991 MB RAM amplifies thrash — more zsmalloc
# bookkeeping competing with workload for CPU during reclaim. Modern
# best practice (Fedora SwapOnZRAM, systemd-zram-generator, HAOS)
# caps zram at 25-50% of RAM.
#
# Compression algorithm: lz4 over zstd. zstd has ~30% better
# compression ratio (3.37× vs 2.63× per xeome's ARM benchmarks) but
# is ~3× slower per page (~5.7 µs vs ~1.7 µs decompression on
# Cortex-A76). For a real-time audio device, every page-fault into
# compressed swap is a jitter risk. lz4 is the lower-latency choice;
# we trade compression ratio for predictable audio. Stage 3 can A/B
# zstd if compression ratio matters more than latency.
#
# After install: `systemctl restart rpi-swap` to apply, then verify
# with `cat /sys/block/zram0/disksize` (should be ~520M on 1GB Pi)
# and `cat /sys/block/zram0/comp_algorithm` (should show `[lz4]`).

[ZRAM]
RamMultiplier=0.5
Algorithm=lz4
