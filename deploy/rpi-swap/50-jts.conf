# /etc/rpi/swap.conf.d/50-jts.conf
#
# JTS zram sizing for the rpi-swap package (Trixie default; replaces
# dphys-swapfile). See swap.conf(5) man page on the Pi.
#
# Reduces zram virtual capacity from the rpi-swap default (RamMultiplier=1
# → ~991 MB on a 1 GB Pi) to 50% of RAM. The 2026-05-23 incident showed
# that 990 MB zram amplifies thrash — more zsmalloc bookkeeping competing
# with workload for CPU during reclaim. Modern best practice (Fedora
# SwapOnZRAM, systemd-zram-generator, HAOS) caps zram at 25-50% of RAM.
#
# IMPORTANT — REBOOT REQUIRED to apply. rpi-swap is a systemd *generator*
# (not a service), so there's no `systemctl restart rpi-swap` — the
# generator runs at early boot and sizes the zram device once. Per the
# swap.conf(5) man page: "After modifying any swap configuration, you
# must reboot the system for changes to take effect." `jasper-doctor`'s
# `check_zram_size_ratio` warns until the reboot happens.
#
# Compression algorithm: NOT configured here. rpi-swap doesn't expose
# the comp_algorithm knob — that's set by kernel default (zstd on this
# Pi). The lz4 case for real-time audio is in the original Stage 1 plan
# (Stage 3 measurement could revisit); for now we accept zstd's ~3×
# slower decompression in exchange for ~30% better ratio. To override:
# write to /sys/block/zram0/comp_algorithm BEFORE the device is sized,
# which would require a generator-stage hook we don't have today.
#
# After reboot, verify with:
#   cat /sys/block/zram0/disksize       # ~520M on 1 GB Pi
#   cat /sys/block/zram0/comp_algorithm # [zstd] (current kernel default)

[Zram]
RamMultiplier=0.5
