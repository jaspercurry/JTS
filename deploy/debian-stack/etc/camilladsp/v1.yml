---
# JTS CamillaDSP config — debian-stack variant.
#
# Bridges snd-aloop card "Loopback" (where go-librespot, shairport-sync,
# and bluealsa-aplay all write their audio) to the Apple USB-C dongle
# (the speaker output). plughw on the capture side absorbs renderer
# rate/format mismatches (Spotify FLOAT_LE/44.1, AirPlay/BT S16/44.1
# all converge here); CamillaDSP resamples internally to 48 kHz which
# is the dongle's native rate.
#
# Differs from the moOde-stack v1.yml in deploy/camilladsp/: the
# moOde variant uses pcm.jasper_capture (a dsnoop wrapper from
# /root/.asoundrc) for capture-side fan-out to the AEC bridge.
# When the AEC bridge is added back on the debian stack, this config
# will switch to the same jasper_capture/jasper_out names.
#
# master_gain mixer is the ducking knob jasper-voice uses on wake.

devices:
  samplerate: 48000
  chunksize: 1024
  queuelimit: 4
  enable_rate_adjust: true
  resampler:
    type: AsyncSinc
    profile: Balanced
  capture:
    type: Alsa
    channels: 2
    device: "plughw:Loopback,1,0"
    format: S32_LE
  playback:
    # jasper_out is the dmix defined in /root/.asoundrc that fans the
    # CamillaDSP-processed music AND jasper-voice TTS into one stream
    # before the dongle. install.sh writes /root/.asoundrc with the
    # detected dongle card name substituted in. CamillaDSP just
    # opens the named PCM here — no card detection needed in this
    # config.
    type: Alsa
    channels: 2
    device: "jasper_out"
    format: S16_LE

filters:
  flat:
    type: Gain
    parameters: { gain: 0.0, inverted: false, mute: false }

mixers:
  master_gain:
    channels: { in: 2, out: 2 }
    mapping:
      - dest: 0
        sources: [{ channel: 0, gain: 0, inverted: false }]
      - dest: 1
        sources: [{ channel: 1, gain: 0, inverted: false }]

pipeline:
  - type: Mixer
    name: master_gain
  - type: Filter
    channels: [0]
    names: [flat]
  - type: Filter
    channels: [1]
    names: [flat]
