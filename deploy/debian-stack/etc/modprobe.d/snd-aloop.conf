# Two snd-aloop cards. "Loopback" carries the renderer→camilla music
# chain (sub0). "LoopbackAEC" carries the AEC mono mic from
# jasper-aec-bridge to jasper-voice (only used if AEC enabled).
#
# index=6,7 — clears HDMI (0,1) and the typical USB auto-assign range
# (3-5). Code references these cards by name (hw:Loopback,...) so the
# specific indices do not matter, but pinning them keeps debug output
# stable across reboots and immune to udev shuffle.
#
# This is the **debian-stack** variant. The moOde stack uses
# index=0,5 because moOde's kernel module load order disables HDMI
# audio early. On a fresh Pi OS Lite, HDMI loads at index 0/1 and
# claiming index=0 fails silently (kernel: "cannot find slot for
# index 0"). 6,7 is robust on either configuration.
options snd-aloop enable=1,1 index=6,7 id=Loopback,LoopbackAEC pcm_substreams=8,1
