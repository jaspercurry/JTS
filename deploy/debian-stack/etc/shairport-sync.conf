// JTS shairport-sync config — AirPlay 2 receiver into snd-aloop.
// Requires source-built shairport-sync with --with-airplay-2 plus
// nqptp.service running (UDP 319/320). The Debian Trixie apt package
// is AP1-only; see deploy/debian-stack/README.md.

general = {
    name = "JTS";
    interpolation = "soxr";
    output_backend = "alsa";
    log_verbosity = 1;
};

sessioncontrol = {
    // Release the loopback device 1s after AP2 idle so other
    // renderers (librespot, bluealsa-aplay) can take over
    // immediately when the user switches sources. moOde used 20s
    // here, but with `latest-source-wins` arbitration in jasper-mux
    // the user's expectation is "I selected Spotify on my phone,
    // it should play right now" — not "wait 20 seconds for the
    // dead AirPlay session to time out." Keep small but non-zero
    // so a brief transport glitch on Mac doesn't destroy the
    // session and force re-establishing.
    session_timeout = 1;
};

alsa = {
    output_device = "hw:Loopback,0,0";
    output_rate = 44100;
    output_format = "S16";
    use_mmap_if_available = "no";
    disable_synchronization = "no";
};

metadata = {
    enabled = "yes";
    include_cover_art = "no";
};

diagnostics = {
    log_show_file_and_line_numbers = "no";
};
