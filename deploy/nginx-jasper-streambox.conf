# JTS streambox nginx site — local renderer + DSP management without
# voice/wake/assistant routes. Full speakers use deploy/nginx-jasper.conf.
# (There is no separate follower nginx site; follower behaviour is a
# runtime grouping role, not a distinct install tier.)

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # no-store: the landing page carries the WS1 control token baked into a
    # <meta> tag (install_management_static_assets bakes the same index.html
    # for the streambox profile), so it must never be cached. Mirrors the
    # full-profile site (deploy/nginx-jasper.conf).
    location = / {
        root /usr/share/jasper-web;
        try_files /index.html =404;
        add_header Cache-Control "no-store";
    }

    location ~* ^/assets/.+\.js$ {
        root /usr/share/jasper-web;
        try_files $uri =404;
        add_header Cache-Control "no-cache";
    }
    location /assets/ {
        root /usr/share/jasper-web;
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /airplay/ {
        proxy_pass http://127.0.0.1:8771/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_redirect off;
    }

    location /bluetooth/ {
        proxy_pass http://127.0.0.1:8769/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # A stale first acknowledgement triggers one source-intent retry:
        # 2 * (793 s broker wait + margin), plus bounded handler/readback slack.
        proxy_read_timeout 1700s;
        proxy_buffering off;
        proxy_redirect off;
    }

    location /spotify/ {
        proxy_pass http://127.0.0.1:8765/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 240s;
        proxy_buffering off;
        proxy_redirect off;
    }

    location /sources/ {
        proxy_pass http://127.0.0.1:8773/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # A stale first acknowledgement can require two starts at the 793 s
        # owner-aware bound; include bounded handler/post-apply readback margin.
        proxy_read_timeout 1700s;
        proxy_buffering off;
        proxy_redirect off;
    }

    location /sound/ {
        proxy_pass http://127.0.0.1:8784/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_redirect off;
    }

    location /speaker/ {
        proxy_pass http://127.0.0.1:8783/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 1800s;
        proxy_buffering off;
        proxy_redirect off;
    }

    location /wifi/ {
        proxy_pass http://127.0.0.1:8775/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # The current handler's preflight + optional hidden retry + cleanup +
        # rollback path has a 155 s outer-timeout ceiling. Preserve 25 s of
        # response/scheduling headroom, matching the full-speaker site.
        proxy_read_timeout 180s;
        proxy_buffering off;
        proxy_redirect off;
    }

    location /rooms/ {
        proxy_pass http://127.0.0.1:8785/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_redirect off;
    }

    location /system/ {
        proxy_pass http://127.0.0.1:8772/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_redirect off;
    }

    location /volume {
        proxy_pass http://127.0.0.1:8780;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    location = /grouping {
        proxy_pass http://127.0.0.1:8780;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    location /source/ {
        proxy_pass http://127.0.0.1:8780;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    location /debug {
        proxy_pass http://127.0.0.1:8780;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    location = /correction {
        add_header Cache-Control "no-store, no-cache, max-age=0, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        return 302 /correction/;
    }
    location = /correction/ {
        root /usr/share/jasper-web;
        try_files /correction-preflight.html =404;
        add_header Cache-Control "no-store, no-cache, max-age=0, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # No-JS fallback for the correction preflight. JS-enabled browsers validate
    # a known subflow and jump directly to the final HTTPS URL with a fresh
    # jts_cb token; these temporary redirects stay strongly non-cacheable so
    # stale mobile redirect state cannot become sticky.
    location = /correction/proceed {
        add_header Cache-Control "no-store, no-cache, max-age=0, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        return 302 https://$host/correction/$is_args$args;
    }

    location = /correction/proceed/room {
        add_header Cache-Control "no-store, no-cache, max-age=0, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        return 302 https://$host/correction/room/$is_args$args;
    }

    location = /correction/proceed/crossover {
        add_header Cache-Control "no-store, no-cache, max-age=0, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        return 302 https://$host/correction/crossover/$is_args$args;
    }

    location = /correction/proceed/bass {
        add_header Cache-Control "no-store, no-cache, max-age=0, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        return 302 https://$host/correction/bass/$is_args$args;
    }

    location = /jts-root-ca.crt {
        root /usr/share/jasper-web;
        try_files /jts-root-ca.crt =404;
        types { } default_type application/x-x509-ca-cert;
        add_header Content-Disposition 'attachment; filename="jts-root-ca.crt"';
    }

    location / {
        return 404;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/jts.local.crt;
    ssl_certificate_key /etc/nginx/ssl/jts.local.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:JtsSSL:10m;
    ssl_session_tickets off;

    location /correction/ {
        proxy_pass http://127.0.0.1:8770/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 32m;
        proxy_buffering off;
        proxy_read_timeout 600s;
    }

    location = /balance { return 308 /balance/; }
    location /balance/ {
        proxy_pass http://127.0.0.1:8770;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 32m;
        proxy_buffering off;
        proxy_read_timeout 600s;
    }

    location = /sync { return 308 /sync/; }
    location /sync/ {
        proxy_pass http://127.0.0.1:8770;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 2m;
        proxy_buffering off;
        proxy_read_timeout 600s;
    }

    location ~* ^/assets/.+\.js$ {
        root /usr/share/jasper-web;
        try_files $uri =404;
        add_header Cache-Control "no-cache";
    }
    location /assets/ {
        root /usr/share/jasper-web;
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        add_header Cache-Control "no-store, no-cache, max-age=0, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        return 302 http://$host$request_uri;
    }
}
