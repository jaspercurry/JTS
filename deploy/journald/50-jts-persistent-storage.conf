# Override Raspberry Pi OS's default `40-rpi-volatile-storage.conf`, which
# forces `Storage=volatile` (journal in /run only). With the kernel watchdog
# enabled by systemd's `RuntimeWatchdogSec=` default, a userspace wedge gets
# hard-reset by `bcm2835-wdt` after ~60s — useful for the speaker recovering
# on its own, but volatile-only journals mean the reboot wipes all evidence
# of what wedged it. The user perceives "the speaker restarted for no reason".
#
# Persist instead, capped to bound SD wear / disk use.
[Journal]
Storage=persistent
# SystemMaxUse is a RETENTION ceiling, not a write-rate knob: journald emits
# the same bytes/day regardless, so raising it does not increase SD write-wear
# — it only lets more history survive before oldest-first vacuuming. 500M is
# ~10 days at the household's ~50 MB/day, covering a 7-day review window plus
# slack, for ~300 MB extra disk (~0.9% of a 32 GB card). See
# docs/HANDOFF-observability.md and docs/HANDOFF-resilience.md.
SystemMaxUse=500M
SystemKeepFree=200M
SystemMaxFileSize=20M
