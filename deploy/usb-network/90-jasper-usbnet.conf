# NetworkManager device policy for JTS's ConfigFS NCM interface.
#
# Raspberry Pi OS marks every DEVTYPE=gadget interface NM_UNMANAGED=1 in
# 85-nm-unmanaged.rules. JTS deliberately gives usb0 to NetworkManager, so
# override that distribution default for this interface only. The static
# jts-usb profile must also activate before a laptop supplies carrier: that is
# what gives the Pi 10.12.194.1 and lets dnsmasq wait ready for attachment.
[device-jts-usb]
match-device=interface-name:usb0
managed=1
ignore-carrier=yes
