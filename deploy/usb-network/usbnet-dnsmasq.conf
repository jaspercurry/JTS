# Scoped dnsmasq config for the USB management network on usb0.
#
# Installed by install.sh to /etc/jasper/usbnet-dnsmasq.conf and run by
# jasper-usbnet-dhcp.service (a device-activated dnsmasq instance bound to
# sys-subsystem-net-devices-usb0.device). We apt-install the `dnsmasq-base`
# package — the binary only, NOT the full `dnsmasq` package (which would
# enable a global system service). See docs/HANDOFF-usb-gadget.md.
#
# This hands a plugged-in laptop an address on the USB link ONLY. It is NOT a
# DNS server (port=0) and deliberately pushes NO router (option 3) and NO DNS
# (option 6), so plugging JTS in can never hijack the laptop's default route
# or DNS resolution. mDNS (Avahi, already advertising on all interfaces) is
# the canonical way to reach http://<hostname>/ over the link; the raw IP is
# the documented fallback.

# Drop privileges to a deterministic unprivileged identity after binding. The
# systemd unit starts dnsmasq as root (no User=) so it can bind the DHCP socket;
# dnsmasq then setuid/setgid's away from root at startup. dnsmasq's default drop
# target is the `dnsmasq` user, which the `dnsmasq-base` package does NOT create
# — so pin nobody:nogroup (both always present) explicitly rather than relying
# on a user that isn't there. The unit's CapabilityBoundingSet includes
# CAP_SETUID/CAP_SETGID so this drop can succeed (a failed drop is fatal to
# dnsmasq). nobody:nogroup can still hold the retained CAP_NET_* caps for the
# raw DHCP socket.
user=nobody
group=nogroup

# Serve only on usb0 — never on lo or any real network interface.
interface=usb0
except-interface=lo
# bind-dynamic tolerates usb0's address appearing AFTER dnsmasq starts (the
# NM keyfile assigns 10.12.194.1 asynchronously) and refuses to grab other
# interfaces, unlike the broader bind-interfaces.
bind-dynamic

# Not a DNS server. port=0 disables the DNS listener entirely; this instance
# only does DHCP.
port=0

# A small pool on the Pi's /24. The Pi itself holds 10.12.194.1.
dhcp-range=10.12.194.10,10.12.194.20,12h

# Push NO default route and NO DNS to the host. Empty-value option 3 (router)
# and option 6 (DNS) explicitly suppress them so a plugged-in laptop keeps its
# own internet path. This is the "no IP forwarding / NAT / internet sharing"
# decision — the seam for a future opt-in internet-sharing config is left
# clean but nothing is built for it here.
dhcp-option=3
dhcp-option=6

# Lease file under the unit's RuntimeDirectory (/run/jasper-usbnet), so it is
# tmpfs-backed and cleared on stop.
dhcp-leasefile=/run/jasper-usbnet/dnsmasq.leases

# Log to journal (systemd captures stderr); no separate log file.
log-facility=-
