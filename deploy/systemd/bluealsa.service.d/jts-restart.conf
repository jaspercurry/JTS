# Always-on renderer hardening: bluealsa is the apt-installed system
# unit that hosts the BlueZ A2DP backend. Its default Restart= policy
# is on-failure (or whatever the package default is), which silently
# drops Bluetooth audio after a clean exit (status=0) — same failure
# mode that PR #4 fixed for shairport-sync, librespot, nqptp, and
# jasper-camilla. Override unconditionally so a clean exit auto-
# recovers. Keep the start-limit window long enough to ride out transient
# memory pressure, but finite so genuine config breakage still parks loudly.
[Unit]
StartLimitIntervalSec=600
StartLimitBurst=20

[Service]
ExecCondition=/opt/jasper/.venv/bin/jasper-local-source-allowed
Restart=always
RestartSec=5
