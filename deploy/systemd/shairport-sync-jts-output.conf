# /etc/systemd/system/shairport-sync.service.d/jts-output.conf
# Installed by deploy/install.sh as a systemd drop-in override.
#
# Why: moOde's stock /etc/shairport-sync.conf has all the alsa block
# settings commented out, and /etc/default/shairport-sync sets
# DAEMON_ARGS="" — so the systemd-managed shairport-sync ends up writing
# to ALSA's `default` device, not to moOde's `_audioout` symbol.
# Our zz-jts-loopback.conf override hijacks `_audioout` to route into
# snd-aloop Loopback so jasper-camilla can capture the stream — but only
# if shairport-sync actually writes there. moOde's own (non-systemd)
# spawn of shairport-sync passed `-d _audioout` on the command line; we
# replicate that here at the systemd-unit layer.
#
# The empty `ExecStart=` clears the unit file's default ExecStart; the
# second `ExecStart=` defines ours. This is the standard pattern for
# systemd drop-in ExecStart overrides.

[Service]
ExecStart=
ExecStart=/usr/bin/shairport-sync -- -d _audioout
