# JTS endpoint nginx site — small management surface for Zero-class
# satellite installs. Full speakers use deploy/nginx-jasper.conf.
#
# Installed to /etc/nginx/sites-enabled/jasper.conf by install.sh when
# JASPER_INSTALL_PROFILE=endpoint.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    location = / {
        root /usr/share/jasper-web;
        try_files /index.html =404;
    }

    location ~* ^/assets/.+\.js$ {
        root /usr/share/jasper-web;
        try_files $uri =404;
        add_header Cache-Control "no-cache";
    }
    location /assets/ {
        root /usr/share/jasper-web;
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location = /sources {
        return 308 /sources/;
    }

    location /sources/ {
        proxy_pass http://127.0.0.1:8773/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_redirect off;
    }

    location = /system {
        return 308 /system/;
    }

    location /system/ {
        proxy_pass http://127.0.0.1:8772/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_redirect off;
    }

    location /volume {
        proxy_pass http://127.0.0.1:8780;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    location = /grouping {
        proxy_pass http://127.0.0.1:8780;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    location /debug {
        proxy_pass http://127.0.0.1:8780;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    location / {
        return 404;
    }
}
