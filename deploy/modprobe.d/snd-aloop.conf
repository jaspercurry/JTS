# Single snd-aloop card: "Loopback" carries the renderer→CamillaDSP
# music chain. Each renderer owns a private playback substream
# (0..4). jasper-fanin reads those capture sides, sums sample-wise,
# and writes the summed stream to substream 7. CamillaDSP and the AEC
# bridge read `pcm.jasper_capture`, a dsnoop on hw:Loopback,1,7.
#
# Full substream-pair allocation (see deploy/alsa/asoundrc.jasper):
#   0-4  per-renderer playback lanes (librespot/shairport/bluealsa/usbsink/
#        correction)
#   5    active N-channel content lane (`outputd_active_content_*`; active box)
#   6    passive stereo content lane  (`outputd_content_*`; passive box) — AND
#        the active-follower grouping round-trip (distributed-active Slice 3):
#        snapclient -> hw:Loopback,0,6 -> CamillaDSP captures hw:Loopback,1,6.
#        Safe to share: the two uses are mutually exclusive by hardware mode —
#        an active follower's outputd is ALWAYS Composite (it reads the
#        active-content lane on pair 5) and NEVER opens the passive content
#        lane, and a passive box that DOES use pair 6 is never an active
#        follower. snd_aloop caps pcm_substreams at 8 (pairs 0-7), so a
#        dedicated 9th pair is not possible without a second card (which
#        reintroduces the removed-LoopbackAEC wedge risk).
#   7    fan-in summed music stream   (`jasper_capture` dsnoop)
#
# index=6 — clears HDMI (0,1) and the typical USB auto-assign range
# (3-5). Code references the card by name (hw:Loopback,...) so the
# specific index does not matter, but pinning it keeps debug output
# stable across reboots and immune to udev shuffle.
#
# Historical note: a second snd-aloop card ("LoopbackAEC" at index=7)
# used to carry the AEC mono mic from jasper-aec-bridge to
# jasper-voice. It was removed in 2026-05-11's resilience-ladder
# PR 2: snd-aloop's loopback_cable kernel state wedges if a consumer
# is SIGKILL'd, requiring `rmmod && modprobe` (with all 6+ consumers
# stopped) or a reboot to clear. The bridge now sends AEC'd mic to
# jasper-voice over UDP localhost — no kernel-side state to corrupt,
# `sendto()` is non-blocking, either side can crash without affecting
# the other.
# pcm_notify=0 added 2026-05-25 as part of the fan-in architecture
# design (see docs/HANDOFF-fan-in-daemon.md). With each renderer owning
# its own snd-aloop substream pair, we don't want the capture side torn
# down when any single substream changes parameters — pcm_notify=0 makes
# the capture side persist across per-substream param changes.
# Default kernel behavior today is also 0, but pinning it explicitly is
# cheap insurance against future kernel default flips.
options snd-aloop enable=1 index=6 id=Loopback pcm_substreams=8 pcm_notify=0
