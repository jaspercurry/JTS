# Two snd-aloop cards. Card 0 ("Loopback") carries the moOde→camilla
# music chain (sub0). Card 1 ("LoopbackAEC") carries the AEC'd
# mono mic from jasper-aec-bridge to jasper-voice.
#
# Two cards instead of one with multiple substreams because
# PortAudio (sounddevice's backend) addresses ALSA cards by name
# but doesn't expose substream selection — without a dedicated
# card, JASPER_MIC_DEVICE='Loopback' would default to substream 0
# which is in use by the music chain.
# index=0,5 — index 1 collides with vc4hdmi0 on Pi 5, kernel
# silently drops the second card on collision. 5 is well clear of
# the typical reserved range (HDMI=1,2; USB devices auto-assign
# 3+).
options snd-aloop enable=1,1 index=0,5 id=Loopback,LoopbackAEC pcm_substreams=8,1
