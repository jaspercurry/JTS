[[surface]]
id = "apt-packages"
kind = "distro-packages"
consumer = "deploy/install.sh: install_deps, install_streambox_deps, and their shared _install_renderer_native_deps helper"
status = "accepted-gap"
notes = "Full-profile package names are listed in install_deps, streambox package names in install_streambox_deps, and their shared renderer package names in _install_renderer_native_deps. All resolve from Debian/Raspberry Pi apt repositories that are signature-verified but not snapshot-pinned."

[[surface]]
id = "python-runtime"
kind = "pypi-resolution"
consumer = "deploy/install.sh, pyproject.toml, and jasper_aec3/pyproject.toml"
status = "accepted-gap"
notes = "Python runtime dependencies and jasper_aec3 build requirements are resolved live during deploy; follow-up work should commit a lock or generated hash requirements and make deploy consume it. pycamilladsp is pinned by commit and sha256 in pyproject.toml but still uses pip's direct upstream GitHub commit archive because this install.sh mirror slice does not edit pyproject.toml."

[[surface]]
id = "source-archive-mirroring"
kind = "release-asset-mirroring"
consumer = "deploy/install.sh and deploy/provenance.toml source-archive artifacts"
status = "pinned"
notes = "nqptp, shairport-sync, and webrtc-audio-processing install-time source builds consume byte-exact JTS release assets under build-deps-v1. Their upstream auto-generated commit archive URLs are retained as upstream_url/upstream_resolved_url provenance."

[[surface]]
id = "rust-fanin-crates"
kind = "cargo-lockfile"
consumer = "rust/jasper-fanin/Cargo.toml and rust/jasper-fanin/Cargo.lock"
status = "pinned"
notes = "Cargo.lock is committed for the jasper-fanin binary crate. install.sh builds from rust/jasper-fanin with cargo --locked, so lock drift fails deploy instead of resolving live."

[[surface]]
id = "rust-outputd-crates"
kind = "cargo-lockfile"
consumer = "rust/jasper-outputd/Cargo.toml and rust/jasper-outputd/Cargo.lock"
status = "pinned"
notes = "Cargo.lock is committed for the jasper-outputd binary crate. install.sh builds from rust/jasper-outputd with cargo --locked, so lock drift fails deploy instead of resolving live."

[[surface]]
id = "rust-usbsink-audio-crates"
kind = "cargo-lockfile"
consumer = "rust/jasper-usbsink-audio/Cargo.toml and rust/jasper-usbsink-audio/Cargo.lock"
status = "pinned"
notes = "Cargo.lock is committed for the jasper-usbsink-audio binary crate. install.sh builds from rust/jasper-usbsink-audio with cargo --locked, so lock drift fails deploy instead of resolving live."

[[surface]]
id = "platformio-registry-libraries"
kind = "platformio-registry-resolution"
consumer = "firmware/dial/platformio.ini and firmware/satellite-amoled/platformio.ini"
status = "partially-pinned"
notes = "Top-level registry dependencies are pinned to exact versions in platformio.ini. PlatformIO still resolves toolchain and transitive metadata from its registry."
