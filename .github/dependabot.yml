# Dependency-update automation for JTS.
#
# Why: JTS is a months-unattended appliance with a security-relevant
# dependency surface (openai, google-genai, httpx, spotipy, onnxruntime,
# pyusb, esptool, dbus-next, zeroconf) plus GitHub Actions and Rust crates.
# Without this, CVEs in pinned deps age silently. Dependabot raises
# review-able PRs that the existing pytest + provenance CI gate validates.
#
# Scope note: Python CI consumes uv.lock, so Python dependency PRs must
# update the lock alongside pyproject.toml. GitHub Actions and Rust crates
# remain separate ecosystems below.
version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "cargo"
    directory: "/rust/jasper-fanin"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "cargo"
    directory: "/rust/jasper-outputd"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
