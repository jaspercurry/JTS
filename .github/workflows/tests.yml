name: tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  shell:
    # Static gate for the highest-blast-radius code in the repo: the
    # installer and the deploy/operator scripts mutate a live speaker
    # as root, yet had no syntax/lint check before this job. Two layers:
    #   - `bash -n`: parse-only syntax check; zero false positives.
    #   - `shellcheck --severity=warning`: real-breakage classes
    #     (unparseable constructs, non-constant source) plus the
    #     warning tier — SC2155 declare-and-assign masking exit codes
    #     is a genuine hazard in these `set -e` scripts, and SC2034
    #     unused-var catches flags that parse but silently do nothing.
    # The 8 warning-level findings present when the error-only gate
    # landed (3×SC2034, 2×SC2155, 2×SC1090, 1×SC2010) were fixed
    # file-by-file before this tightened to warning. Extending the
    # selection to the whole deploy tree + capture-page (2026-07)
    # surfaced 1×SC2164 in the usbsink gadget teardown script (a
    # failed cd would have run relative-path rm/rmdir as root from
    # the wrong CWD on a teardown-race path); the composite-gadget
    # rewrite (#1164) independently shipped the same cd guard, so
    # the widened gate landed with zero outstanding findings.
    # Info/style severities (~35 findings, several intentional ssh
    # client-side expansion patterns) remain ungated; tightening
    # further is a separate triage. Do not loosen below warning.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: bash -n + shellcheck (warning severity)
        # Select tracked shell files across the whole deploy tree (plus
        # scripts, firmware, and capture-page) by shebang/extension. The
        # shebang/extension filter is the discriminator: install.sh copies
        # deploy content onto production speakers, so any shell file added
        # anywhere under deploy/ should auto-gate — enumerating deploy
        # subdirs individually is how deploy/usbsink sat uncovered for a
        # month (2026-07-04 review). The filter skips deploy's python3
        # entry points (deploy/bin's librespot event hook + jasper-deploy-
        # health, deploy/usbsink's uac2_name_patch.py) and never matches
        # shebang-less configs/units/assets; it keeps shebang-less .sh
        # source libraries and scripts/use; capture-page carries the
        # Pages-bundle build entry point. shellcheck is preinstalled on
        # ubuntu-latest runners.
        run: |
          set -euo pipefail
          shell_files=()
          while IFS= read -r f; do
            # head -c + tr strips NULs so binary assets under deploy/
            # (woff2 fonts) don't trip bash's null-byte warning; 128
            # bytes is ample for any shebang.
            first_line="$(head -c 128 "$f" | tr -d '\0' | head -n 1 || true)"
            if [[ "$f" != *.sh && "$f" != scripts/use \
                  && "$first_line" != '#!'*bash* \
                  && "$first_line" != '#!'*sh* ]]; then
              continue
            fi
            case "$first_line" in
              '#!'*python*|'#!'*node*) echo "skip (non-shell): $f"; continue ;;
            esac
            shell_files+=("$f")
            bash -n "$f"
          done < <(git ls-files deploy scripts firmware capture-page)
          # Floor 95: losing a whole pathspec (scripts ~66 files,
          # deploy ~37) lands well under it; small-path losses are
          # what the required pins below catch.
          if (( ${#shell_files[@]} < 95 )); then
            echo "expected at least 95 tracked shell files, found ${#shell_files[@]}" >&2
            printf 'selected: %s\n' "${shell_files[@]}" >&2
            exit 1
          fi
          for required in firmware/dial/build.sh firmware/satellite-amoled/build.sh deploy/usbsink/jasper-usbgadget-up capture-page/build.sh; do
            found=false
            for f in "${shell_files[@]}"; do
              if [[ "$f" == "$required" ]]; then
                found=true
                break
              fi
            done
            if [[ "$found" != true ]]; then
              echo "required shell file not selected: $required" >&2
              printf 'selected: %s\n' "${shell_files[@]}" >&2
              exit 1
            fi
          done
          echo "bash -n ok over ${#shell_files[@]} shell files"
          shellcheck --severity=warning "${shell_files[@]}"
          echo "shellcheck --severity=warning clean"

  pytest-matrix:
    name: pytest / py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    # Default provider for tests that load jasper.config (the config
    # loader hard-fails without this set). Individual tests can override.
    env:
      JASPER_VOICE_PROVIDER: gemini
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: System deps for sounddevice (portaudio)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends portaudio19-dev

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          # Pin uv itself so dependency installation is reproducible for
          # the same reason `uv sync --locked` is.
          version: "0.11.14"
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Supply-chain provenance check
        run: python3 scripts/check-provenance.py

      - name: Install JTS from committed uv lock
        run: uv sync --locked --extra full --extra dev --group openwakeword-onnx

      - name: Install openwakeword without its tflite-runtime dep
        # openwakeword 0.6.0 hard-requires tflite-runtime, which has no
        # Python 3.13 wheel. We use ONNX models exclusively, so tflite is
        # never imported at runtime. This stays after uv sync because sync
        # is exact by default and would otherwise remove the package.
        run: uv pip install --python .venv/bin/python --no-deps openwakeword==0.6.0

      - name: Lint (ruff)
        if: matrix.python-version == '3.13'
        # ruff ships in the dev extras installed above. Config + rule
        # selection live in [tool.ruff] in pyproject.toml. Runs before
        # the suite for fast feedback on undefined names / dead imports.
        run: .venv/bin/ruff check .

      - name: Type check (mypy; lenient baseline)
        if: matrix.python-version == '3.13'
        # mypy ships in the dev extras installed above. The config starts
        # permissive and baselines current debt with per-module overrides, so
        # this step catches new unbaselined type regressions without turning a
        # partially typed codebase strict on day one.
        run: .venv/bin/mypy

      - name: Test (hardware-free; voice_eval explicitly excluded)
        # voice_eval is the paid LLM suite — never CI material, purely on
        # cost discipline. The test_doctor OPENAI_API_KEY=wiz-key env-leak
        # (via load_env_files) is now contained by conftest.py's autouse
        # _isolate_environ fixture (landed in #256), which snapshots and
        # restores os.environ around every test. --ignore is justified
        # solely by paid-LLM cost — not by the leak, which is fixed.
        # pytest-xdist keeps the merge gate broad without making every PR wait
        # for a serial 6k-test run. Keep the worker count explicit; `-n auto`
        # can over-fan-out on larger machines and make socket/subprocess-heavy
        # tests noisier than the fixed 4-worker gate we validated locally.
        run: scripts/test-merge

  pytest:
    # Branch protection requires a stable check named exactly `pytest`.
    # The versioned matrix above fans out the real work; this aggregate
    # preserves the required-check contract while making each interpreter's
    # failure independently visible in GitHub Actions.
    name: pytest
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: pytest-matrix
    if: ${{ always() }}
    steps:
      - name: Require all Python matrix jobs
        run: |
          if [[ "${{ needs['pytest-matrix'].result }}" != "success" ]]; then
            echo "pytest matrix result: ${{ needs['pytest-matrix'].result }}" >&2
            exit 1
          fi
          echo "pytest matrix result: success"

  js:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Browser module syntax + harnesses
        run: |
          set -euo pipefail
          bash scripts/check-js-syntax.sh
          node tests/js/sound_profile_harness.mjs deploy/assets/sound-profile/js/main.js
          node tests/js/dialog_harness.mjs deploy/assets/shared/js/dialog.js
          node scripts/check-peq-parity.mjs
          node scripts/check-balance-trim-parity.mjs
          node tests/js/correction_render_harness.mjs deploy/assets/correction/js/main.js
          node tests/js/capture_level_events_test.mjs capture-page/js/level-events.js
          node scripts/check-sensitivity-trim-parity.mjs

  rust:
    # CI formats, lints, compiles, and tests the Rust audio daemons — the
    # pytest job above does not. The job name is required by branch protection,
    # so PRs that do not touch Rust-relevant surfaces still run this job and
    # exit green quickly after scripts/rust-ci-needed. Rust-relevant PRs and
    # every push to main run the full Cargo gate. Without this, a dependency
    # bump (e.g. the `alsa` crate used by jasper-fanin/jasper-outputd) that
    # breaks the build passes CI green and only fails at deploy-time
    # `cargo build` on the Pi, and a logic regression in the output/loudness
    # path goes uncaught. `cargo test --release --locked` mirrors install.sh's
    # release build profile and runs each crate's hardware-free unit tests.
    # Rustfmt and default Clippy-with-warnings-as-errors are the low-noise
    # table stakes; do not broaden to pedantic/restriction lint groups without
    # a separate triage. Pin the Rust toolchain to the Pi/Trixie-era rustc so
    # Clippy's warn-by-default set is not a moving merge gate.
    #
    # History: enabling this gate first surfaced 3 stale jasper-outputd
    # tests (assistant-gain clamp + loudness) that had been red since the
    # "calibrate assistant loudness" rework but were invisible because Rust
    # tests never ran in CI; those expectations were corrected (the
    # calibrated gain is QUIETER, safe-direction) and `cargo test` re-enabled
    # here.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      RUST_TOOLCHAIN: "1.85.0"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Decide whether Rust gate is needed
        id: rust-needed
        run: scripts/rust-ci-needed

      - name: Skip Rust gate when unrelated
        if: steps.rust-needed.outputs.run != 'true'
        run: echo "${{ steps.rust-needed.outputs.reason }}"

      - name: Install pinned Rust toolchain
        if: steps.rust-needed.outputs.run == 'true'
        run: rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal --component rustfmt --component clippy

      - name: Rust formatting (rustfmt)
        if: steps.rust-needed.outputs.run == 'true'
        run: |
          set -euo pipefail
          for crate in \
            rust/jasper-clock \
            rust/jasper-resampler \
            rust/jasper-ring \
            rust/jasper-host-clock \
            rust/jasper-tts-protocol \
            rust/jasper-fanin \
            rust/jasper-outputd \
            rust/jasper-usbsink-audio \
            rust/jasper-dual-dac-lab
          do
            (cd "$crate" && cargo +"$RUST_TOOLCHAIN" fmt --all -- --check)
          done

      - name: System deps for the ALSA crate
        if: steps.rust-needed.outputs.run == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libasound2-dev

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        if: steps.rust-needed.outputs.run == 'true'
        with:
          workspaces: |
            rust/jasper-clock
            rust/jasper-resampler
            rust/jasper-ring
            rust/jasper-host-clock
            rust/jasper-fanin
            rust/jasper-outputd
            rust/jasper-usbsink-audio
            rust/jasper-dual-dac-lab
            rust/jasper-tts-protocol

      - name: jasper-clock — clippy
        if: steps.rust-needed.outputs.run == 'true'
        working-directory: rust/jasper-clock
        run: cargo +"$RUST_TOOLCHAIN" clippy --release --locked --all-targets -- --no-deps -D warnings

      - name: jasper-resampler — clippy
        if: steps.rust-needed.outputs.run == 'true'
        # Pure windowed-sinc resampler + rate controller (depends on
        # jasper-clock). No ALSA, so this clippy/test runs on any host.
        working-directory: rust/jasper-resampler
        run: cargo +"$RUST_TOOLCHAIN" clippy --release --locked --all-targets -- --no-deps -D warnings

      - name: jasper-ring — clippy
        if: steps.rust-needed.outputs.run == 'true'
        # PROTOTYPE (latency/ring-proto-shm): the SPSC SHM ping-pong ring reader
        # for jasper-outputd's shm_ring content bridge. Pure Rust (mmap via
        # libc, no ALSA), so this clippy/test runs on any host — the sibling of
        # jasper-clock/jasper-resampler in the gate.
        working-directory: rust/jasper-ring
        run: cargo +"$RUST_TOOLCHAIN" clippy --release --locked --all-targets -- --no-deps -D warnings

      - name: jasper-host-clock — clippy (all features incl. the ALSA actuator)
        if: steps.rust-needed.outputs.run == 'true'
        # The daemon-agnostic host-slaved USB clock ladder + servo + write-gate,
        # shared by jasper-usbsink-audio (solo mode) and jasper-fanin (combo
        # mode). The pure ladder/servo compiles with no features; `--all-features`
        # links the ALSA `AlsaPitchCtl` actuator so it is linted too (libasound2-dev
        # is installed above). Same -D warnings gate as its siblings.
        working-directory: rust/jasper-host-clock
        run: cargo +"$RUST_TOOLCHAIN" clippy --release --locked --all-targets --all-features -- --no-deps -D warnings

      - name: jasper-tts-protocol — clippy
        if: steps.rust-needed.outputs.run == 'true'
        working-directory: rust/jasper-tts-protocol
        run: cargo +"$RUST_TOOLCHAIN" clippy --release --locked --all-targets -- --no-deps -D warnings

      - name: jasper-fanin — clippy
        if: steps.rust-needed.outputs.run == 'true'
        working-directory: rust/jasper-fanin
        run: cargo +"$RUST_TOOLCHAIN" clippy --release --locked --all-targets -- --no-deps -D warnings

      - name: jasper-outputd — clippy
        if: steps.rust-needed.outputs.run == 'true'
        working-directory: rust/jasper-outputd
        run: cargo +"$RUST_TOOLCHAIN" clippy --release --locked --all-targets -- --no-deps -D warnings

      - name: jasper-usbsink-audio — clippy
        if: steps.rust-needed.outputs.run == 'true'
        working-directory: rust/jasper-usbsink-audio
        run: cargo +"$RUST_TOOLCHAIN" clippy --release --locked --all-targets -- --no-deps -D warnings

      - name: jasper-dual-dac-lab — clippy
        if: steps.rust-needed.outputs.run == 'true'
        working-directory: rust/jasper-dual-dac-lab
        run: cargo +"$RUST_TOOLCHAIN" clippy --release --locked --all-targets -- --no-deps -D warnings

      - name: jasper-clock — build + test (pure DLL crate; no ALSA)
        if: steps.rust-needed.outputs.run == 'true'
        # The shared clock primitive (spa_dll port). Pure Rust, no libasound,
        # so this is the crate whose convergence/no-oscillation properties are
        # the regression gate for every consumer's loop math.
        working-directory: rust/jasper-clock
        run: cargo +"$RUST_TOOLCHAIN" test --release --locked

      - name: jasper-resampler — build + test (pure resampler crate; no ALSA)
        if: steps.rust-needed.outputs.run == 'true'
        # The shared windowed-sinc resampler + rate controller. Pure Rust, no
        # libasound, so its pass-through / capture-follower frame-count /
        # streaming-continuity / loop-sign properties are the regression gate
        # for the daemon path (jasper-outputd's content_bridge), its sole
        # consumer.
        working-directory: rust/jasper-resampler
        run: cargo +"$RUST_TOOLCHAIN" test --release --locked

      - name: jasper-ring — build + test (pure SHM ring crate; no ALSA)
        if: steps.rust-needed.outputs.run == 'true'
        # PROTOTYPE (latency/ring-proto-shm): the SPSC SHM ping-pong ring
        # reader. Pure Rust (mmap via libc), so its seq/wrap/epoch/attach-resync
        # and golden-layout properties (the cross-language drift pin against the
        # C `_Static_assert`ed header) are the regression gate for the shm_ring
        # content bridge, and run on any host.
        working-directory: rust/jasper-ring
        run: cargo +"$RUST_TOOLCHAIN" test --release --locked

      - name: jasper-host-clock — build + test (pure ladder/servo; no ALSA)
        if: steps.rust-needed.outputs.run == 'true'
        # The shared host-slaved USB clock. The pure ladder/probe/servo/write-gate
        # + the status-fragment byte-shape run with NO features (no libasound), so
        # its ladder-transition / probe / write-gate / clamp / anti-windup /
        # fragment-shape properties are the regression gate for BOTH consumers
        # (jasper-usbsink-audio solo, jasper-fanin combo) and run on any host.
        working-directory: rust/jasper-host-clock
        run: cargo +"$RUST_TOOLCHAIN" test --release --locked

      - name: jts-ring-ioplug — C core host test (compiles the _Static_asserts)
        if: steps.rust-needed.outputs.run == 'true'
        # The C HALF of the golden-layout drift pin. `make test` compiles
        # jts_ring_shm.c (which pulls in jts_ring_shm.h's offsetof/_Static_assert
        # gates and the ATOMIC_LLONG_LOCK_FREE==2 assert) and runs test_ring_core.
        # Without this the Rust golden-layout test alone runs in CI, so a C-side
        # offset drift would only fail on-Pi at build-on-pi.sh time. Host-safe
        # (no libasound); `make plugin` stays Pi-only.
        working-directory: c/jts-ring-ioplug
        run: make test

      - name: jasper-tts-protocol — build + test (shared wire-protocol crate)
        if: steps.rust-needed.outputs.run == 'true'
        working-directory: rust/jasper-tts-protocol
        run: cargo +"$RUST_TOOLCHAIN" test --release --locked

      - name: jasper-fanin — build + test (release, locked; mirrors install.sh)
        if: steps.rust-needed.outputs.run == 'true'
        working-directory: rust/jasper-fanin
        run: cargo +"$RUST_TOOLCHAIN" test --release --locked

      - name: jasper-outputd — build + test (release, locked; mirrors install.sh)
        if: steps.rust-needed.outputs.run == 'true'
        working-directory: rust/jasper-outputd
        run: cargo +"$RUST_TOOLCHAIN" test --release --locked

      - name: jasper-usbsink-audio — build + test (release, locked; mirrors install.sh)
        if: steps.rust-needed.outputs.run == 'true'
        # Production USB low-latency data plane. This default-feature test builds
        # the ALSA-backed binary on Linux with libasound2-dev, unlike local macOS
        # no-default-feature unit tests.
        working-directory: rust/jasper-usbsink-audio
        run: cargo +"$RUST_TOOLCHAIN" test --release --locked

      - name: jasper-dual-dac-lab — build + test (release, locked)
        if: steps.rust-needed.outputs.run == 'true'
        # Lab-only crate: install.sh does NOT build it, so this step is
        # its only rot gate. Without it, a shared-dependency bump (the
        # same `alsa` crate the production daemons pin) can silently
        # break the lab runner until someone needs it on a bench.
        working-directory: rust/jasper-dual-dac-lab
        run: cargo +"$RUST_TOOLCHAIN" test --release --locked
