name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shell:
    # Static gate for the highest-blast-radius code in the repo: the
    # installer and the deploy/operator scripts mutate a live speaker
    # as root, yet had no syntax/lint check before this job. Two layers:
    #   - `bash -n`: parse-only syntax check; zero false positives.
    #   - `shellcheck --severity=error`: the real-breakage class only
    #     (e.g. missing shell directives on sourced libs, unparseable
    #     constructs shellcheck models that bash -n waves through).
    # Warning/info/style severities are deliberately NOT gated yet:
    # when this gate landed the tree carried 8 warning-level findings
    # (3×SC2034 unused-var, 2×SC2155 declare-masks-rc, 2×SC1090
    # non-constant source, 1×SC2010 ls|grep) and ~35 info/style ones —
    # several intentional (ssh client-side expansion patterns).
    # Tightening to --severity=warning is a follow-up once those are
    # triaged file-by-file; do not loosen below error.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: bash -n + shellcheck (error severity)
        # deploy/bin mixes bash policy scripts with a python3 librespot
        # event hook — select shell files by shebang. The shebang-less
        # scripts/_*.sh source-only libs carry a `# shellcheck
        # shell=bash` directive and are included. shellcheck is
        # preinstalled on ubuntu-latest runners.
        run: |
          set -euo pipefail
          shopt -s nullglob
          shell_files=()
          for f in deploy/install.sh deploy/configure-bluez.sh \
                   deploy/bin/* deploy/lib/*.sh scripts/*.sh scripts/use; do
            case "$(head -n 1 "$f")" in
              '#!'*python*|'#!'*node*) echo "skip (non-shell): $f"; continue ;;
            esac
            shell_files+=("$f")
            bash -n "$f"
          done
          echo "bash -n ok over ${#shell_files[@]} shell files"
          shellcheck --severity=error "${shell_files[@]}"
          echo "shellcheck --severity=error clean"

  pytest:
    runs-on: ubuntu-latest
    # Default provider for tests that load jasper.config (the config
    # loader hard-fails without this set). Individual tests can override.
    env:
      JASPER_VOICE_PROVIDER: gemini
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: System deps for sounddevice (portaudio)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends portaudio19-dev

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Supply-chain provenance check
        run: python3 scripts/check-provenance.py

      - name: Install openwakeword without its tflite-runtime dep
        # openwakeword 0.6.0 hard-requires tflite-runtime, which has no
        # Python 3.13 wheel. We use ONNX models exclusively, so tflite is
        # never imported at runtime. Mirrors deploy/install.sh.
        run: |
          pip install --no-deps openwakeword==0.6.0
          pip install requests tqdm 'scikit-learn>=1,<2'

      - name: Install JTS with dev extras
        run: pip install -e '.[dev]'

      - name: Lint (ruff)
        # ruff ships in the dev extras installed above. Config + rule
        # selection live in [tool.ruff] in pyproject.toml. Runs before
        # the suite for fast feedback on undefined names / dead imports.
        run: ruff check .

      - name: Test (hardware-free; voice_eval explicitly excluded)
        # voice_eval is the paid LLM suite — never CI material, purely on
        # cost discipline. The test_doctor OPENAI_API_KEY=wiz-key env-leak
        # (via load_env_files) is now contained by conftest.py's autouse
        # _isolate_environ fixture (landed in #256), which snapshots and
        # restores os.environ around every test. --ignore is justified
        # solely by paid-LLM cost — not by the leak, which is fixed.
        run: pytest -q --tb=short --ignore=tests/voice_eval

  rust:
    # CI compiles AND tests the Rust audio daemons — the pytest job above
    # does not. Without this, a dependency bump (e.g. the `alsa` crate used
    # by jasper-fanin/jasper-outputd) that breaks the build passes CI green
    # and only fails at deploy-time `cargo build` on the Pi, and a logic
    # regression in the output/loudness path goes uncaught. Mirrors
    # install.sh's build (`cargo build --release --locked`) and runs each
    # crate's hardware-free unit tests. Uses the runner's preinstalled
    # stable cargo (Trixie ships rustc 1.85; ubuntu-latest is well above
    # that). This is a required check on main alongside `pytest`.
    #
    # History: enabling this gate first surfaced 3 stale jasper-outputd
    # tests (assistant-gain clamp + loudness) that had been red since the
    # "calibrate assistant loudness" rework but were invisible because Rust
    # tests never ran in CI; those expectations were corrected (the
    # calibrated gain is QUIETER, safe-direction) and `cargo test` re-enabled
    # here.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: System deps for the ALSA crate
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libasound2-dev

      - name: jasper-fanin — build + test (release, locked; mirrors install.sh)
        working-directory: rust/jasper-fanin
        run: |
          cargo build --release --locked
          cargo test --locked

      - name: jasper-outputd — build + test (release, locked; mirrors install.sh)
        working-directory: rust/jasper-outputd
        run: |
          cargo build --release --locked
          cargo test --locked

      - name: jasper-dual-dac-lab — build + test (release, locked)
        # Lab-only crate: install.sh does NOT build it, so this step is
        # its only rot gate. Without it, a shared-dependency bump (the
        # same `alsa` crate the production daemons pin) can silently
        # break the lab runner until someone needs it on a bench.
        working-directory: rust/jasper-dual-dac-lab
        run: |
          cargo build --release --locked
          cargo test --locked
