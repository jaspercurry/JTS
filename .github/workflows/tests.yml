name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    # Default provider for tests that load jasper.config (the config
    # loader hard-fails without this set). Individual tests can override.
    env:
      JASPER_VOICE_PROVIDER: gemini
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: System deps for sounddevice (portaudio)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends portaudio19-dev

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Supply-chain provenance check
        run: python3 scripts/check-provenance.py

      - name: Install openwakeword without its tflite-runtime dep
        # openwakeword 0.6.0 hard-requires tflite-runtime, which has no
        # Python 3.13 wheel. We use ONNX models exclusively, so tflite is
        # never imported at runtime. Mirrors deploy/install.sh.
        run: |
          pip install --no-deps openwakeword==0.6.0
          pip install requests tqdm 'scikit-learn>=1,<2'

      - name: Install JTS with dev extras
        run: pip install -e '.[dev]'

      - name: Lint (ruff)
        # ruff ships in the dev extras installed above. Config + rule
        # selection live in [tool.ruff] in pyproject.toml. Runs before
        # the suite for fast feedback on undefined names / dead imports.
        run: ruff check .

      - name: Test (hardware-free; voice_eval explicitly excluded)
        # voice_eval is the paid LLM suite — never CI material, purely on
        # cost discipline. The test_doctor OPENAI_API_KEY=wiz-key env-leak
        # (via load_env_files) is now contained by conftest.py's autouse
        # _isolate_environ fixture (landed in #256), which snapshots and
        # restores os.environ around every test. --ignore is justified
        # solely by paid-LLM cost — not by the leak, which is fixed.
        run: pytest -q --tb=short --ignore=tests/voice_eval

  rust:
    # CI must actually COMPILE the Rust audio daemons — the pytest job
    # above does not. Without this, a dependency bump (e.g. the `alsa`
    # crate used by jasper-fanin/jasper-outputd) that breaks the build
    # passes CI green and only fails at deploy-time `cargo build` on the
    # Pi. This job mirrors install.sh's build (`cargo build --release
    # --locked`). Uses the runner's preinstalled stable cargo (Trixie
    # ships rustc 1.85; ubuntu-latest is well above that). NOTE: make this
    # a required check in main's branch protection (alongside `pytest`)
    # once this lands on main.
    #
    # `cargo test --locked` is intentionally NOT run here yet. Adding this
    # gate surfaced 3 PRE-EXISTING unit-test failures in jasper-outputd
    # that were invisible because Rust tests never ran in CI:
    #   core::tests::outputd_clamps_assistant_gain_before_mixing
    #   core::tests::resuming_content_meter_clears_prepared_loudness_context
    #   loudness::tests::steady_tone_reports_plausible_loudness
    # They lag the "calibrate assistant loudness in outputd" rework
    # (commit 1853474 + the Level-match commits) — the calibrated assistant
    # gain is QUIETER than the stale expectation (-15.5 vs -6.0 dB), i.e.
    # safe-direction, not a loud-output regression. Re-enable `cargo test
    # --locked` for both crates once the loudness owner updates those
    # expectations.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: System deps for the ALSA crate
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libasound2-dev

      - name: jasper-fanin — build (release, locked; mirrors install.sh)
        working-directory: rust/jasper-fanin
        run: cargo build --release --locked

      - name: jasper-outputd — build (release, locked; mirrors install.sh)
        working-directory: rust/jasper-outputd
        run: cargo build --release --locked
