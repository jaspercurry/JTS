name: tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  shell:
    # Static gate for the highest-blast-radius code in the repo: the
    # installer and the deploy/operator scripts mutate a live speaker
    # as root, yet had no syntax/lint check before this job. Two layers:
    #   - `bash -n`: parse-only syntax check; zero false positives.
    #   - `shellcheck --severity=warning`: real-breakage classes
    #     (unparseable constructs, non-constant source) plus the
    #     warning tier — SC2155 declare-and-assign masking exit codes
    #     is a genuine hazard in these `set -e` scripts, and SC2034
    #     unused-var catches flags that parse but silently do nothing.
    # The 8 warning-level findings present when the error-only gate
    # landed (3×SC2034, 2×SC2155, 2×SC1090, 1×SC2010) were fixed
    # file-by-file before this tightened to warning. Info/style
    # severities (~35 findings, several intentional ssh client-side
    # expansion patterns) remain ungated; tightening further is a
    # separate triage. Do not loosen below warning.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: bash -n + shellcheck (warning severity)
        # deploy/bin mixes bash policy scripts with a python3 librespot
        # event hook — select tracked shell files by shebang, plus
        # shebang-less .sh source libraries and scripts/use. shellcheck is
        # preinstalled on ubuntu-latest runners.
        run: |
          set -euo pipefail
          shell_files=()
          while IFS= read -r f; do
            first_line="$(head -n 1 "$f" || true)"
            if [[ "$f" != *.sh && "$f" != scripts/use \
                  && "$first_line" != '#!'*bash* \
                  && "$first_line" != '#!'*sh* ]]; then
              continue
            fi
            case "$first_line" in
              '#!'*python*|'#!'*node*) echo "skip (non-shell): $f"; continue ;;
            esac
            shell_files+=("$f")
            bash -n "$f"
          done < <(git ls-files deploy/install.sh deploy/configure-bluez.sh deploy/bin deploy/lib scripts firmware)
          if (( ${#shell_files[@]} < 60 )); then
            echo "expected at least 60 tracked shell files, found ${#shell_files[@]}" >&2
            printf 'selected: %s\n' "${shell_files[@]}" >&2
            exit 1
          fi
          for required in firmware/dial/build.sh firmware/satellite-amoled/build.sh; do
            found=false
            for f in "${shell_files[@]}"; do
              if [[ "$f" == "$required" ]]; then
                found=true
                break
              fi
            done
            if [[ "$found" != true ]]; then
              echo "required shell file not selected: $required" >&2
              printf 'selected: %s\n' "${shell_files[@]}" >&2
              exit 1
            fi
          done
          echo "bash -n ok over ${#shell_files[@]} shell files"
          shellcheck --severity=warning "${shell_files[@]}"
          echo "shellcheck --severity=warning clean"

  pytest-matrix:
    name: pytest / py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    # Default provider for tests that load jasper.config (the config
    # loader hard-fails without this set). Individual tests can override.
    env:
      JASPER_VOICE_PROVIDER: gemini
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: System deps for sounddevice (portaudio)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends portaudio19-dev

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Supply-chain provenance check
        run: python3 scripts/check-provenance.py

      - name: Install openwakeword without its tflite-runtime dep
        # openwakeword 0.6.0 hard-requires tflite-runtime, which has no
        # Python 3.13 wheel. We use ONNX models exclusively, so tflite is
        # never imported at runtime. Mirrors deploy/install.sh.
        run: |
          pip install --no-deps openwakeword==0.6.0
          pip install requests tqdm 'scikit-learn>=1,<2'

      - name: Install JTS with full runtime + dev extras
        run: pip install -e '.[full,dev]'

      - name: Lint (ruff)
        if: matrix.python-version == '3.13'
        # ruff ships in the dev extras installed above. Config + rule
        # selection live in [tool.ruff] in pyproject.toml. Runs before
        # the suite for fast feedback on undefined names / dead imports.
        run: ruff check .

      - name: Type check (mypy; lenient baseline)
        if: matrix.python-version == '3.13'
        # mypy ships in the dev extras installed above. The config starts
        # permissive and baselines current debt with per-module overrides, so
        # this step catches new unbaselined type regressions without turning a
        # partially typed codebase strict on day one.
        run: mypy

      - name: Test (hardware-free; voice_eval explicitly excluded)
        # voice_eval is the paid LLM suite — never CI material, purely on
        # cost discipline. The test_doctor OPENAI_API_KEY=wiz-key env-leak
        # (via load_env_files) is now contained by conftest.py's autouse
        # _isolate_environ fixture (landed in #256), which snapshots and
        # restores os.environ around every test. --ignore is justified
        # solely by paid-LLM cost — not by the leak, which is fixed.
        # pytest-xdist keeps the merge gate broad without making every PR wait
        # for a serial 6k-test run. Keep the worker count explicit; `-n auto`
        # can over-fan-out on larger machines and make socket/subprocess-heavy
        # tests noisier than the fixed 4-worker gate we validated locally.
        run: scripts/test-merge

  pytest:
    # Branch protection requires a stable check named exactly `pytest`.
    # The versioned matrix above fans out the real work; this aggregate
    # preserves the required-check contract while making each interpreter's
    # failure independently visible in GitHub Actions.
    name: pytest
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: pytest-matrix
    if: ${{ always() }}
    steps:
      - name: Require all Python matrix jobs
        run: |
          if [[ "${{ needs['pytest-matrix'].result }}" != "success" ]]; then
            echo "pytest matrix result: ${{ needs['pytest-matrix'].result }}" >&2
            exit 1
          fi
          echo "pytest matrix result: success"

  js:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Browser module syntax + harnesses
        run: |
          set -euo pipefail
          js_files=()
          while IFS= read -r f; do
            js_files+=("$f")
          done < <(git ls-files 'deploy/assets/**/js/*.js' 'tests/js/*.mjs')
          if (( ${#js_files[@]} == 0 )); then
            echo "no JavaScript files found for syntax check" >&2
            exit 1
          fi
          for f in "${js_files[@]}"; do
            node --check "$f"
          done
          node tests/js/sound_profile_harness.mjs deploy/assets/sound-profile/js/main.js
          node tests/js/dialog_harness.mjs deploy/assets/shared/js/dialog.js
          node scripts/check-peq-parity.mjs

  rust:
    # CI compiles AND tests the Rust audio daemons — the pytest job above
    # does not. The job name is required by branch protection, so PRs that
    # do not touch Rust-relevant surfaces still run this job and exit green
    # quickly after scripts/rust-ci-needed. Rust-relevant PRs and every
    # push to main run the full Cargo gate. Without this, a dependency bump
    # (e.g. the `alsa` crate used by jasper-fanin/jasper-outputd) that
    # breaks the build passes CI green and only fails at deploy-time
    # `cargo build` on the Pi, and a logic regression in the output/
    # loudness path goes uncaught. Mirrors install.sh's release build
    # profile and runs each crate's hardware-free unit tests.
    #
    # History: enabling this gate first surfaced 3 stale jasper-outputd
    # tests (assistant-gain clamp + loudness) that had been red since the
    # "calibrate assistant loudness" rework but were invisible because Rust
    # tests never ran in CI; those expectations were corrected (the
    # calibrated gain is QUIETER, safe-direction) and `cargo test` re-enabled
    # here.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Decide whether Rust gate is needed
        id: rust-needed
        run: scripts/rust-ci-needed

      - name: Skip Rust gate when unrelated
        if: steps.rust-needed.outputs.run != 'true'
        run: echo "${{ steps.rust-needed.outputs.reason }}"

      - name: System deps for the ALSA crate
        if: steps.rust-needed.outputs.run == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libasound2-dev

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        if: steps.rust-needed.outputs.run == 'true'
        with:
          workspaces: |
            rust/jasper-fanin
            rust/jasper-outputd
            rust/jasper-dual-dac-lab
            rust/jasper-tts-protocol

      - name: jasper-tts-protocol — build + test (shared wire-protocol crate)
        if: steps.rust-needed.outputs.run == 'true'
        working-directory: rust/jasper-tts-protocol
        run: cargo test --release --locked

      - name: jasper-fanin — build + test (release, locked; mirrors install.sh)
        if: steps.rust-needed.outputs.run == 'true'
        working-directory: rust/jasper-fanin
        run: cargo test --release --locked

      - name: jasper-outputd — build + test (release, locked; mirrors install.sh)
        if: steps.rust-needed.outputs.run == 'true'
        working-directory: rust/jasper-outputd
        run: cargo test --release --locked

      - name: jasper-dual-dac-lab — build + test (release, locked)
        if: steps.rust-needed.outputs.run == 'true'
        # Lab-only crate: install.sh does NOT build it, so this step is
        # its only rot gate. Without it, a shared-dependency bump (the
        # same `alsa` crate the production daemons pin) can silently
        # break the lab runner until someone needs it on a bench.
        working-directory: rust/jasper-dual-dac-lab
        run: cargo test --release --locked
