name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: System deps for sounddevice (portaudio)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends portaudio19-dev

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install openwakeword without its tflite-runtime dep
        # openwakeword 0.6.0 hard-requires tflite-runtime, which has no
        # Python 3.13 wheel. We use ONNX models exclusively, so tflite is
        # never imported at runtime. Mirrors deploy/install.sh.
        run: |
          pip install --no-deps openwakeword==0.6.0
          pip install requests tqdm 'scikit-learn>=1,<2'

      - name: Install JTS with dev extras
        run: pip install -e '.[dev]'

      - name: Test (hardware-free; voice_eval auto-skips without keys)
        run: pytest -q --tb=short

      # Lint deferred: `ruff check .` reports ~185 pre-existing
      # violations (mostly in tests/voice_eval/). Adding lint to CI
      # needs a separate cleanup pass; out of scope for this PR,
      # which is just "give us pytest CI."
