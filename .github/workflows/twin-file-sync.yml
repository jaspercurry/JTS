name: Twin file sync

# CLAUDE.md and AGENTS.md are twin AI-agent guides — same content for
# different agents. Both files' headers say "Keep both in sync when
# editing", but drift has happened in practice. This check fails any PR
# that touches one without keeping it in sync with the other.
#
# Header lines differ intentionally (Claude's `@README.md` import is
# Claude-specific). Below the header, the files must match byte-for-byte.
# Split points: line 20 of CLAUDE.md / line 19 of AGENTS.md.

on:
  pull_request:
    paths:
      - CLAUDE.md
      - AGENTS.md

jobs:
  diff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compare CLAUDE.md and AGENTS.md below their headers
        run: |
          if ! diff -u <(tail -n +21 CLAUDE.md) <(tail -n +20 AGENTS.md); then
            echo "::error::CLAUDE.md and AGENTS.md have drifted below their headers."
            echo "To re-sync: head -n 19 AGENTS.md > /tmp/h && tail -n +21 CLAUDE.md >> /tmp/h && mv /tmp/h AGENTS.md"
            exit 1
          fi
