name: Doc freshness check

# Runs `scripts/doc-freshness.sh` on every PR (and on manual
# `workflow_dispatch`). Posts/updates a sticky comment on the PR with
# the current stale-doc list. Non-blocking: stale items don't fail
# the workflow or block merge — this is a soft reminder, matching the
# script's "informational, not enforcement" design.
#
# How to read the comment: the script flags any HANDOFF or top-level
# doc whose `Last verified: YYYY-MM-DD` footer (or, when absent, its
# last git commit) is older than the threshold (default 90 days). For
# each flagged doc, either bump the footer after re-reading, or fix
# what's stale. See AGENTS.md "Documentation paradigm" rule 3.
#
# Fork PRs note: the default GITHUB_TOKEN issued to a PR from a fork
# can't write to the base repo, so the comment step will silently
# no-op for fork PRs. The check itself still runs and the output
# shows up in the Actions tab's step summary.

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          # Full history so doc-freshness.sh's `git log` fallback
          # sees real commit dates per file, not just HEAD.
          fetch-depth: 0

      - name: Run doc-freshness check
        id: check
        run: |
          set -euo pipefail
          OUTPUT=$(bash scripts/doc-freshness.sh 90 --all)
          echo "$OUTPUT"
          # Mirror to the Actions run summary so manual runs show
          # something visible without needing PR comments.
          {
            echo '## Doc freshness'
            echo
            echo '```'
            echo "$OUTPUT"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          MISSING_COUNT=$(echo "$OUTPUT" | sed -nE 's/^Summary: ([0-9]+) missing footer, ([0-9]+) stale,.*/\1/p')
          STALE_COUNT=$(echo "$OUTPUT" | sed -nE 's/^Summary: ([0-9]+) missing footer, ([0-9]+) stale,.*/\2/p')
          MISSING_COUNT=${MISSING_COUNT:-0}
          STALE_COUNT=${STALE_COUNT:-0}
          ISSUE_COUNT=$(( MISSING_COUNT + STALE_COUNT ))
          echo "missing_count=${MISSING_COUNT}" >> "$GITHUB_OUTPUT"
          echo "stale_count=${STALE_COUNT:-0}" >> "$GITHUB_OUTPUT"
          echo "issue_count=${ISSUE_COUNT}" >> "$GITHUB_OUTPUT"
          {
            echo 'output<<DOCFRESHNESS_EOF'
            echo "$OUTPUT"
            echo 'DOCFRESHNESS_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Update PR sticky comment
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          MISSING_COUNT: ${{ steps.check.outputs.missing_count }}
          STALE_COUNT: ${{ steps.check.outputs.stale_count }}
          ISSUE_COUNT: ${{ steps.check.outputs.issue_count }}
          OUTPUT: ${{ steps.check.outputs.output }}
        run: |
          set -euo pipefail
          MARKER='<!-- doc-freshness-bot -->'
          # Find existing sticky comment by HTML-comment marker.
          EXISTING_ID=$(gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
            --jq ".[] | select(.body | contains(\"${MARKER}\")) | .id" \
            | head -1 || true)
          # Build the comment body in a file (avoids YAML heredoc
          # indentation issues — keeps every bash line at the YAML
          # block-scalar indent).
          BODY_FILE="$(mktemp)"
          if [[ "$ISSUE_COUNT" == "0" ]]; then
            if [[ -z "$EXISTING_ID" ]]; then
              echo "No stale items, no existing comment — nothing to do."
              exit 0
            fi
            {
              echo "$MARKER"
              echo "## Doc freshness: all clear"
              echo
              echo "No HANDOFFs are overdue for re-verification (90-day threshold)."
              echo
              echo "_Posted by \`scripts/doc-freshness.sh\` via \`.github/workflows/doc-freshness.yml\` — informational, non-blocking._"
            } > "$BODY_FILE"
          else
            {
              echo "$MARKER"
              echo "## Doc freshness: ${STALE_COUNT} stale, ${MISSING_COUNT} missing footer"
              echo
              echo '```'
              echo "$OUTPUT"
              echo '```'
              echo
              echo "For each stale doc, re-read it against the current code and either:"
              echo "- bump the \`Last verified:\` footer to today's date, or"
              echo "- update the content."
              echo
              echo 'See AGENTS.md "Documentation paradigm" rule 3. **Informational only — this PR can still merge.**'
            } > "$BODY_FILE"
          fi
          if [[ -n "$EXISTING_ID" ]]; then
            echo "Updating existing sticky comment ${EXISTING_ID}"
            gh api -X PATCH "repos/${GITHUB_REPOSITORY}/issues/comments/${EXISTING_ID}" \
              -F "body=@${BODY_FILE}" > /dev/null || {
                echo "Could not update PR comment; leaving workflow non-blocking."
                exit 0
              }
          else
            echo "Creating new sticky comment"
            gh pr comment "$PR_NUMBER" --body-file "$BODY_FILE" || {
              echo "Could not create PR comment; leaving workflow non-blocking."
              exit 0
            }
          fi
