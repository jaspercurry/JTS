---
# Auto-generated JTS DSP config (id=simple-id).
# Source: jasper.sound.camilla_yaml.emit_sound_config
# DO NOT HAND-EDIT — update http://jts.local/correction/ or
# http://jts.local/sound/ instead.
#
# Structure mirrors deploy/camilladsp/outputd-cutover.yml.
# Room-correction PEQs, when present, run before sound-curve /
# preference-EQ filters. The `master_gain` mixer remains identity so
# the Ducker contract holds.
# output_trim_db=4.000

devices:
  samplerate: 48000
  chunksize: 1024
  queuelimit: 4
  target_level: 2048
  volume_limit: 0.0
  enable_rate_adjust: true
  capture:
    type: Alsa
    channels: 2
    device: "plug:jasper_capture"
    format: S32_LE
  playback:
    type: Alsa
    channels: 2
    device: "outputd_content_playback"
    format: S16_LE

filters:
  flat:
    type: Gain
    parameters: { gain: 0.0000, inverted: false, mute: false }
  sound_preamp:
    type: Gain
    parameters: { gain: -4.0000, inverted: false, mute: false }
  sound_simple_sub_bass:
    type: Biquad
    parameters:
      type: Lowshelf
      freq: 60.0000
      slope: 6.0000
      gain: 3.0000
  sound_simple_bass:
    type: Biquad
    parameters:
      type: Peaking
      freq: 150.0000
      q: 1.0000
      gain: 6.0000
  sound_simple_treble:
    type: Biquad
    parameters:
      type: Highshelf
      freq: 10000.0000
      slope: 6.0000
      gain: 3.0000

mixers:
  master_gain:
    channels: { in: 2, out: 2 }
    mapping:
      - dest: 0
        sources: [{ channel: 0, gain: 0, inverted: false }]
      - dest: 1
        sources: [{ channel: 1, gain: 0, inverted: false }]

pipeline:
  - type: Mixer
    name: master_gain
  - type: Filter
    channels: [0]
    names: [sound_preamp, sound_simple_sub_bass, sound_simple_bass, sound_simple_treble, flat]
  - type: Filter
    channels: [1]
    names: [sound_preamp, sound_simple_sub_bass, sound_simple_bass, sound_simple_treble, flat]
