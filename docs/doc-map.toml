# Documentation impact map.
#
# This file is a routing layer, not a second architecture spec. It maps
# high-risk code areas to the canonical docs future humans and agents should
# scan when those areas change. Keep entries coarse; false positives are okay
# because the PR comment is informational and non-blocking.

[[subsystem]]
id = "docs-governance"
title = "Documentation governance and AI-agent context"
safety = "safe-ci"
code = [
  "AGENTS.md",
  "CLAUDE.md",
  "README.md",
  "CONTRIBUTING.md",
  ".github/PULL_REQUEST_TEMPLATE.md",
  ".github/workflows/doc-*.yml",
  ".github/workflows/docs-*.yml",
  "scripts/doc-freshness.sh",
  "scripts/docs-impact.py",
  "scripts/docs-linkcheck.py",
  "docs/doc-map.toml",
  "docs/testing-tooling.md",
]
docs = [
  "AGENTS.md",
  "CLAUDE.md",
  "README.md",
  "CONTRIBUTING.md",
  "docs/testing-tooling.md",
]
requires_docs_when = [
  "The documentation paradigm, README atlas, agent context loading, PR documentation-impact workflow, freshness checks, or docs routing map changes.",
]
verification = [
  "python3 scripts/docs-impact.py --validate-only",
  "python3 scripts/docs-linkcheck.py --changed-file README.md",
  "bash scripts/doc-freshness.sh 90 --all",
]

