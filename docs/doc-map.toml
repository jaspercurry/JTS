# Documentation impact map.
#
# This file is a routing layer, not a second architecture spec. It maps
# high-risk code areas to the canonical docs future humans and agents should
# scan when those areas change. Keep entries coarse; false positives are okay
# because the PR comment is informational and non-blocking.

[document_classes]
# Intentionally present top-level docs that are not canonical subsystem
# scan targets. They still satisfy the no-orphan-doc invariant, but a
# code change should not route future maintainers to them as current
# operational truth. Empty right now: executed session artifacts move
# to docs/historical/, which sits outside both the orphan sweep and
# this routing map (see the moOde-removal and 2026-06-10
# hw-validation runbooks there).
session_artifacts = [
  "docs/AEC-DIAG-01-baseline.md",
  # Execution artifact: per-window build prompts for the barge-in plan in
  # HANDOFF-barge-in.md. Not a canonical scan target; retire when barge-in ships.
  "docs/barge-in-build-prompts.md",
]
# Prior-art research artifacts: long-lived studies kept as reference (each
# tagged `Status: research` in-doc), not canonical operational scan targets.
# They satisfy the no-orphan-doc invariant without routing a future maintainer
# to them as current operational truth.
research = [
  "docs/RESEARCH-pipewire-low-latency.md",
]

