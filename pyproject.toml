[project]
name = "jasper-speaker"
version = "0.1.0"
description = "Open smart-speaker voice daemon for Pi 5 + moOde + CamillaDSP"
requires-python = ">=3.11"
dependencies = [
    "google-genai==1.13.0",
    "camilladsp @ git+https://github.com/HEnquist/pycamilladsp@v4.0.0",
    # openwakeword==0.6.0 is installed by deploy/install.sh with --no-deps
    # because its transitive tflite-runtime dep has no Python 3.13 wheel
    # (PiOS Trixie's default python). We use ONNX models exclusively, so
    # tflite-runtime is never imported at runtime. See install.sh.
    "sounddevice==0.5.5",
    "numpy>=1.26,<3",
    "spotipy==2.24.0",
    "python-mpd2==3.1.1",
    "httpx==0.28.1",
    "onnxruntime>=1.17",
    "nyct-gtfs==2.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.23",
    "ruff>=0.6",
]

[project.scripts]
jasper-voice = "jasper.voice_daemon:main"
jasper-spotify-auth = "jasper.cli.spotify_auth:main"
jasper-doctor = "jasper.cli.doctor:main"
jasper-web = "jasper.web.spotify_setup:main"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["jasper*"]

[tool.setuptools.package-data]
"jasper.data" = ["*.csv"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
# `auto` mode applies @pytest.mark.asyncio implicitly to every async
# def test, so we don't have to repeat the marker on every test.
# Required by tests/test_gemini_session.py and tests/test_gemini_connection.py.
asyncio_mode = "auto"
