[project]
name = "jasper-speaker"
version = "0.1.0"
description = "Open smart-speaker voice daemon for Pi 5 + moOde + CamillaDSP"
requires-python = ">=3.11"
dependencies = [
    "google-genai==1.13.0",
    "pycamilladsp==4.0.0",
    "openwakeword==0.6.0",
    "sounddevice==0.5.5",
    "numpy>=1.26,<3",
    "spotipy==2.24.0",
    "python-mpd2==3.1.1",
    "httpx==0.28.1",
    "onnxruntime>=1.17",
    "nyct-gtfs==2.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.23",
    "ruff>=0.6",
]

[project.scripts]
jasper-voice = "jasper.voice_daemon:main"
jasper-spotify-auth = "jasper.cli.spotify_auth:main"
jasper-doctor = "jasper.cli.doctor:main"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["jasper*"]

[tool.setuptools.package-data]
"jasper.data" = ["*.csv"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
# No asyncio_mode here yet — current tests are sync. Add it back along
# with pytest-asyncio in the test environment when the first async test
# lands.
