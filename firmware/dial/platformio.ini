; CrowPanel 1.28" HMI Rotary Display — ESP32-S3R8, 8MB PSRAM, 16MB flash.
; https://www.elecrow.com/wiki/CrowPanel_1.28inch-HMI_ESP32_Rotary_Display_Arduino_lesson1.html
;
; Phase 1 firmware: WiFi (Improv-over-Serial provisioning) + encoder
; volume control via HTTP to jasper-control on the Pi. No display, no
; play/pause, no hold-to-talk yet — those land in phases 2/3/5.
;
; Build / flash / monitor:
;   pio run -t upload -t monitor
;
; First-time provisioning is normally handled by jasper-dial-onboard
; on the Pi. For dev iteration on a laptop, plug the dial into USB-C
; and open https://www.improv-wifi.com/ to push WiFi credentials.

[platformio]
default_envs = crowpanel-128-rotary-hmi
src_dir = src
include_dir = include

[env:crowpanel-128-rotary-hmi]
platform = espressif32@^6.7.0
board = esp32-s3-devkitc-1
framework = arduino

; ESP32-S3R8 = S3 + 8MB OPI PSRAM.
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.psram_type = opi
board_build.flash_size = 16MB
board_build.partitions = default_16MB.csv
board_upload.flash_size = 16MB

; Native USB-CDC: dial enumerates as /dev/ttyACM0 on the Pi
; (no separate USB-UART chip), and Improv-over-Serial speaks the
; same channel. ARDUINO_USB_MODE=1 selects native USB; CDC_ON_BOOT
; makes Serial.* go to USB without manual USB.begin().
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DJASPER_DIAL_FIRMWARE_VERSION=\"0.1.0\"

monitor_speed = 115200
monitor_dtr = 0
monitor_rts = 0
upload_speed = 921600

lib_deps =
    https://github.com/jnthas/Improv-WiFi-Library.git
    fastled/FastLED@^3.6.0
