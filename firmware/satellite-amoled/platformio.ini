; Waveshare ESP32-S3-Touch-AMOLED-1.8 — JTS satellite mic + display.
; https://www.waveshare.com/wiki/ESP32-S3-Touch-AMOLED-1.8
;
; ESP32-S3R8 (8 MB OPI PSRAM, 16 MB flash), 368×448 AMOLED (SH8601 QSPI),
; FT3168 capacitive touch, ES8311 codec (I²S, analog mic + speaker),
; AXP2101 PMIC + Li-ion connector, QMI8658 IMU, TCA9554 I/O expander,
; WiFi 2.4 GHz + BLE 5, native USB-CDC over Type-C.
;
; Framework: Arduino-ESP32 v3.x (which sits on ESP-IDF v5.x). We use
; Arduino conventions for the boot path / WiFi / Improv / LVGL — same
; as firmware/dial/ — and drop to raw ESP-IDF APIs for I²S audio
; capture and ES8311 codec setup where Arduino's audio abstractions
; are weaker than ESP-IDF's. See docs/satellites.md for the broader
; cross-cutting design.
;
; Phases (this file evolves with them):
; - Milestone 1: USB-CDC boot prints + memory snapshot. (this file)
; - Phase 0: I²S mic capture + record-or-stream for SNR test.
; - Phase 1: + WiFi (Improv-over-Serial) + LVGL "Tap to talk" UI +
;            UDP audio stream to Pi.
; - Phase 2: + Pi-side multi-source WakeLoop (always-streaming mode).
; - Phase 3: + microWakeWord on-device for battery operation.
;
; Build / flash / monitor:
;   pio run -t upload -t monitor
;
; Or via the build helper (mirrors firmware/dial/build.sh):
;   bash firmware/satellite-amoled/build.sh

[platformio]
default_envs = waveshare-amoled-1p8
src_dir = src
include_dir = include

[env:waveshare-amoled-1p8]
; pioarduino's Arduino-ESP32 v3.x (which sits on ESP-IDF v5.x). The
; satellite needs v3.x for moononournation's Arduino_GFX SH8601 driver
; (added in v1.6.1, depends on esp32-hal-periman.h which is v3.x-only).
; firmware/dial/ pins to the same platform release for toolchain parity.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38-1/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino

; ESP32-S3R8 = S3 + 8MB OPI PSRAM. esptool flash-id confirmed 16MB
; Winbond on this specific device.
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.psram_type = opi
board_build.flash_size = 16MB
board_build.partitions = default_16MB.csv
board_upload.flash_size = 16MB

; Native USB-CDC: device enumerates as /dev/ttyACM0 on the Pi
; (no separate USB-UART chip), confirmed empirically.
; ARDUINO_USB_MODE=1 selects native USB; CDC_ON_BOOT makes Serial.*
; go to USB without manual USB.begin().
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DJASPER_SATELLITE_AMOLED_FIRMWARE_VERSION=\"0.3.2\"
    -I include

monitor_speed = 115200
monitor_dtr = 0
monitor_rts = 0
upload_speed = 921600

; Libraries are added phase by phase as they become needed.
;   Phase 1.1: ImprovWiFi (provisioning) + ArduinoJson (HTTP responses)
;   Phase 1.2: Arduino_GFX for SH8601 (connection-status indicator).
;              No LVGL yet — direct GFX draws are sufficient at this
;              milestone. Adding LVGL later is fine; Arduino_GFX exposes
;              a flush hook for it.
;   Phase 1.4: capacitive touch driver (FT3168)
;   Phase 3:   microWakeWord runtime
lib_deps =
    https://github.com/jnthas/Improv-WiFi-Library.git#e37c244e0080349e191252acf4bce146eca118e0
    bblanchon/ArduinoJson@7.0.0
    moononournation/GFX Library for Arduino@1.6.5
