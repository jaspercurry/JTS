minimum_pre_commit_version: "3.0.0"

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.17
    hooks:
      - id: ruff-check

  - repo: local
    hooks:
      - id: node-check-static-js
        name: node --check static JS
        entry: scripts/check-js-syntax.sh
        language: system
        files: ^(deploy/assets/.*/js/.*\.js|tests/js/.*\.mjs)$
